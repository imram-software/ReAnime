<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Re:Anime</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet" />
  <style>
    /* ─────────────────────────────────────────
       TOKENS & RESET
    ───────────────────────────────────────── */
    :root {
      --bg:        #080808;
      --bg2:       #111111;
      --bg3:       #1a1a1a;
      --surface:   #161616;
      --border:    #222222;
      --pink:      #ff2d78;
      --pink-dim:  #ff2d7822;
      --pink-glow: #ff2d7855;
      --rose:      #ff6fa8;
      --text:      #e8e8e8;
      --muted:     #666;
      --radius:    10px;
      --font-head: 'Bebas Neue', cursive;
      --font-body: 'DM Sans', sans-serif;
      --font-jp:   'Noto Sans JP', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 2px; }

    /* ─────────────────────────────────────────
       NOISE OVERLAY (texture)
    ───────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.4;
    }

    /* ─────────────────────────────────────────
       HEADER
    ───────────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      background: rgba(8,8,8,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--font-head);
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--pink);
      text-shadow: 0 0 20px var(--pink-glow);
      user-select: none;
    }

    .logo span { color: var(--text); }

    .header-right {
      display: flex; align-items: center; gap: 1rem;
    }

    #theme-toggle-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: 0.35rem 0.7rem; font-size: 0.8rem;
      cursor: pointer; transition: all 0.2s;
      font-family: var(--font-body);
    }
    #theme-toggle-btn:hover { border-color: var(--pink); color: var(--pink); }

    #login-btn {
      background: var(--pink); color: #fff;
      padding: 0.4rem 1.1rem; border-radius: 6px;
      text-decoration: none; font-size: 0.85rem;
      font-weight: 700; letter-spacing: 0.5px;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 16px var(--pink-glow);
    }
    #login-btn:hover { opacity: 0.85; }

    #user-info {
      display: flex; align-items: center; gap: 0.5rem;
      cursor: pointer; position: relative;
    }
    #user-info img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--pink); }
    #user-info span { font-size: 0.85rem; color: var(--text); }

    #user-popup {
      position: absolute; top: 44px; right: 0;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem;
      min-width: 180px; display: none; z-index: 100;
    }
    #user-popup button {
      display: block; width: 100%; margin-top: 0.5rem;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 0.5rem;
      cursor: pointer; font-family: var(--font-body); font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    #user-popup button:hover { border-color: var(--pink); color: var(--pink); }

    /* ─────────────────────────────────────────
       INTRO / HERO
    ───────────────────────────────────────── */
    #intro {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      position: relative; overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 60%, #ff2d7812 0%, transparent 70%);
    }

    /* Decorative Japanese-style grid lines */
    .hero-lines {
      position: absolute; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,45,120,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,45,120,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }

    .hero-badge {
      font-family: var(--font-jp);
      font-size: 0.7rem; letter-spacing: 4px;
      color: var(--pink); text-transform: uppercase;
      border: 1px solid var(--pink-dim);
      padding: 0.3rem 1rem; border-radius: 30px;
      margin-bottom: 1.5rem; position: relative; z-index: 1;
    }

    #intro h1 {
      font-family: var(--font-head);
      font-size: clamp(5rem, 15vw, 11rem);
      line-height: 0.9;
      letter-spacing: 8px;
      color: var(--text);
      position: relative; z-index: 1;
    }

    #intro h1 em {
      color: var(--pink);
      font-style: normal;
      text-shadow: 0 0 40px var(--pink-glow), 0 0 80px var(--pink-dim);
    }

    .hero-sub {
      font-size: 1rem; color: var(--muted);
      margin: 1.5rem 0 2.5rem;
      max-width: 420px; line-height: 1.6;
      position: relative; z-index: 1;
    }

    .btn-enter {
      position: relative; z-index: 1;
      background: transparent;
      border: 1px solid var(--pink);
      color: var(--pink); font-family: var(--font-head);
      font-size: 1.3rem; letter-spacing: 3px;
      padding: 0.9rem 3rem; border-radius: 4px;
      cursor: pointer; overflow: hidden;
      transition: color 0.3s;
    }
    .btn-enter::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--pink);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.35s cubic-bezier(.77,0,.18,1);
      z-index: -1;
    }
    .btn-enter:hover::before { transform: scaleX(1); }
    .btn-enter:hover { color: #fff; }

    /* Scroll indicator */
    .scroll-hint {
      position: absolute; bottom: 2rem; left: 50%;
      transform: translateX(-50%); z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
    }
    .scroll-hint span { font-size: 0.65rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
    .scroll-line {
      width: 1px; height: 40px;
      background: linear-gradient(var(--pink), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%,100% { opacity: 0.3; transform: scaleY(0.7); }
      50% { opacity: 1; transform: scaleY(1); }
    }

    /* ─────────────────────────────────────────
       MAIN APP (hidden until enter)
    ───────────────────────────────────────── */
    #app { display: none; padding-top: 56px; }

    /* Section wrapper */
    .section { padding: 3rem 0; }
    .section-header {
      padding: 0 2rem 1.5rem;
      display: flex; align-items: baseline; gap: 1rem;
    }
    .section-title {
      font-family: var(--font-head);
      font-size: 2rem; letter-spacing: 3px; color: var(--text);
    }
    .section-title em { color: var(--pink); font-style: normal; }
    .section-line {
      flex: 1; height: 1px; background: var(--border);
    }
    .section-count { font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; }

    /* ─────────────────────────────────────────
       NEWS SLIDER
    ───────────────────────────────────────── */
    .news-track-wrap {
      position: relative; overflow: hidden;
      padding: 0 2rem;
    }
    #news-track {
      display: flex; gap: 1.2rem;
      transition: transform 0.55s cubic-bezier(.77,0,.18,1);
      will-change: transform;
    }

    .news-card {
      flex: 0 0 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: border-color 0.3s, transform 0.3s;
    }
    .news-card:hover { border-color: var(--pink); transform: translateY(-4px); }
    .news-card a { text-decoration: none; color: inherit; display: block; }
    .news-card img {
      width: 100%; height: 180px; object-fit: cover;
      display: block;
      filter: brightness(0.85);
      transition: filter 0.3s;
    }
    .news-card:hover img { filter: brightness(1); }
    .news-card-body { padding: 1rem; }
    .news-card-body h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.4rem; line-height: 1.3; }
    .news-card-body p { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
    .news-card-body small { font-size: 0.7rem; color: var(--pink); margin-top: 0.5rem; display: block; }

    /* Pink accent bar on left */
    .news-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: var(--pink);
      transform: scaleY(0); transform-origin: bottom;
      transition: transform 0.3s;
    }
    .news-card:hover::before { transform: scaleY(1); }

    .slider-controls {
      display: flex; justify-content: flex-end;
      padding: 1rem 2rem 0; gap: 0.5rem;
    }
    .slider-btn {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: none; color: var(--muted);
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .slider-btn:hover { border-color: var(--pink); color: var(--pink); }

    /* ─────────────────────────────────────────
       FILTER BAR
    ───────────────────────────────────────── */
    .filter-bar {
      padding: 0 2rem 1.5rem;
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;
    }

    #search-input {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px;
      padding: 0.55rem 1rem; font-size: 0.9rem;
      font-family: var(--font-body); outline: none;
      min-width: 220px; transition: border-color 0.2s;
    }
    #search-input::placeholder { color: var(--muted); }
    #search-input:focus { border-color: var(--pink); box-shadow: 0 0 0 2px var(--pink-dim); }

    .genre-scroll {
      display: flex; gap: 0.5rem; overflow-x: auto;
      padding-bottom: 2px; flex: 1;
    }
    .genre-scroll::-webkit-scrollbar { height: 2px; }

    .genre-chip {
      flex-shrink: 0;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--muted); border-radius: 30px;
      padding: 0.35rem 0.9rem; font-size: 0.78rem;
      cursor: pointer; user-select: none;
      transition: all 0.2s; white-space: nowrap;
      font-family: var(--font-body);
    }
    .genre-chip:hover { border-color: var(--rose); color: var(--rose); }
    .genre-chip.active { background: var(--pink); border-color: var(--pink); color: #fff; }

    /* ─────────────────────────────────────────
       ANIME GRID
    ───────────────────────────────────────── */
    #anime-directory {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      padding: 0 2rem 3rem;
    }

    .anime-card {
      position: relative; overflow: hidden;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.3s, border-color 0.3s;
      aspect-ratio: 2/3;
    }
    .anime-card:hover { transform: translateY(-6px) scale(1.02); border-color: var(--pink); }

    .anime-card img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; transition: filter 0.4s;
    }
    .anime-card:hover img { filter: brightness(0.6); }

    .anime-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 0.8rem;
    }

    .anime-card-title {
      font-size: 0.82rem; font-weight: 700; line-height: 1.3;
      color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    .anime-card-genre {
      font-size: 0.65rem; color: var(--pink);
      margin-top: 0.2rem; opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
      font-family: var(--font-jp);
    }
    .anime-card:hover .anime-card-genre { opacity: 1; transform: translateY(0); }

    /* Pink corner accent */
    .anime-card::after {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 28px 28px 0;
      border-color: transparent var(--pink) transparent transparent;
      opacity: 0; transition: opacity 0.3s;
    }
    .anime-card:hover::after { opacity: 1; }

    /* Empty state */
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 4rem 2rem; color: var(--muted);
    }
    .empty-state p { font-size: 1rem; }

    /* ─────────────────────────────────────────
       ANIME DETAIL PAGE
    ───────────────────────────────────────── */
    #anime-details {
      display: none; padding: 2rem;
      max-width: 1000px; margin: 0 auto;
    }

    .detail-back {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--muted); font-size: 0.85rem;
      cursor: pointer; margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .detail-back:hover { color: var(--pink); }

    .detail-header {
      display: flex; gap: 2rem;
      margin-bottom: 2rem;
    }
    .detail-cover {
      width: 180px; flex-shrink: 0;
      border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--border);
    }
    .detail-cover img { width: 100%; height: 260px; object-fit: cover; display: block; }

    .detail-meta { flex: 1; }
    .detail-meta h2 {
      font-family: var(--font-head);
      font-size: 2.5rem; letter-spacing: 3px;
      color: var(--text); margin-bottom: 0.5rem; line-height: 1;
    }
    .detail-genres {
      display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem;
    }
    .detail-genre-tag {
      font-size: 0.7rem; color: var(--pink);
      border: 1px solid var(--pink-dim);
      padding: 0.2rem 0.6rem; border-radius: 30px;
      font-family: var(--font-jp);
    }
    .detail-description {
      font-size: 0.9rem; color: var(--muted); line-height: 1.7;
    }

    .episodes-title {
      font-family: var(--font-head);
      font-size: 1.3rem; letter-spacing: 2px;
      color: var(--text); margin-bottom: 1rem;
    }

    #episode-list {
      display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem;
    }
    #episode-list button {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: 0.4rem 0.8rem; font-size: 0.8rem;
      cursor: pointer; font-family: var(--font-body);
      transition: all 0.2s;
    }
    #episode-list button:hover { border-color: var(--rose); color: var(--rose); }
    #episode-list button.active { background: var(--pink); border-color: var(--pink); color: #fff; }

    #video-player {
      width: 100%; aspect-ratio: 16/9;
      background: #000; border-radius: var(--radius);
      overflow: hidden; border: 1px solid var(--border);
      box-shadow: 0 0 40px var(--pink-dim);
      position: relative;
    }
    .video-container { width: 100%; height: 100%; position: relative; }
    .video-container iframe,
    .video-container video {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: none;
    }

    /* ─────────────────────────────────────────
       MASCOT
    ───────────────────────────────────────── */
    #mascot-container {
      position: fixed; bottom: 0; left: 10vw;
      z-index: 2000; width: 72px; pointer-events: none;
    }
    #mascot-img {
      width: 72px; height: 72px; object-fit: contain;
      cursor: pointer; pointer-events: auto;
      transition: transform 0.15s;
      filter: drop-shadow(0 0 8px var(--pink-glow));
    }
    #mascot-img:hover { transform: scale(1.1); }

    #mascot-speech {
      position: absolute; bottom: 76px; left: 50%;
      transform: translateX(-50%);
      background: var(--bg2); color: var(--rose);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 0.5rem 0.9rem;
      font-size: 0.78rem; white-space: nowrap;
      max-width: 220px; white-space: normal;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      pointer-events: none;
      animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateX(-50%) scale(0.8); }
      to   { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    /* Chat panel */
    #mascot-chat {
      position: fixed; right: 1.5rem; bottom: 1.5rem; z-index: 3000;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 1rem;
      width: 300px; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.8rem; padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    .chat-header span { font-size: 0.85rem; font-weight: 700; color: var(--pink); }

    #mascot-chat-messages {
      height: 180px; overflow-y: auto;
      font-size: 0.83rem; line-height: 1.5;
      padding: 0.4rem; border-radius: 6px;
      margin-bottom: 0.8rem;
    }
    #mascot-chat-messages::-webkit-scrollbar { width: 2px; }

    .chat-msg { margin-bottom: 0.5rem; }
    .chat-msg.bot { color: var(--rose); }
    .chat-msg.user { color: var(--muted); text-align: right; }

    #mascot-chat-input {
      width: 100%; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: 0.45rem 0.8rem;
      font-size: 0.85rem; font-family: var(--font-body); outline: none;
      margin-bottom: 0.5rem; transition: border-color 0.2s;
    }
    #mascot-chat-input:focus { border-color: var(--pink); }

    .chat-actions { display: flex; gap: 0.5rem; }
    #mascot-chat-send {
      flex: 1; background: var(--pink); border: none;
      color: #fff; border-radius: 6px;
      padding: 0.45rem; font-weight: 700; font-size: 0.82rem;
      cursor: pointer; font-family: var(--font-body); transition: opacity 0.2s;
    }
    #mascot-chat-send:hover { opacity: 0.85; }
    #mascot-chat-close {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: 0.45rem 0.7rem; cursor: pointer; font-size: 0.8rem;
      font-family: var(--font-body); transition: all 0.2s;
    }
    #mascot-chat-close:hover { border-color: var(--pink); color: var(--pink); }

    /* ─────────────────────────────────────────
       FOOTER
    ───────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-logo { font-family: var(--font-head); font-size: 1.5rem; color: var(--pink); letter-spacing: 3px; }
    footer p { font-size: 0.78rem; color: var(--muted); }
    footer a { color: var(--rose); text-decoration: none; }
    footer a:hover { color: var(--pink); }

    /* ─────────────────────────────────────────
       UTILITIES
    ───────────────────────────────────────── */
    .hidden { display: none !important; }

    .fade-enter {
      animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Light mode override */
    body.light {
      --bg: #f5f5f5; --bg2: #ffffff; --bg3: #eeeeee;
      --surface: #ffffff; --border: #e0e0e0;
      --text: #111; --muted: #888;
      --pink-dim: #ff2d7818;
    }
    body.light .anime-card-title { color: #111; }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 600px) {
      #intro h1 { font-size: 4.5rem; }
      .detail-header { flex-direction: column; }
      .detail-cover { width: 100%; }
      .detail-cover img { height: 200px; }
      #anime-directory { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
      .news-card { flex: 0 0 280px; }
      footer { flex-direction: column; text-align: center; }
      #mascot-chat { width: calc(100vw - 2rem); right: 1rem; }
    }
  </style>
</head>

<audio id="bg-music" src="Assets/background-theme.mp3" loop hidden></audio>

<body>

  <!-- ─── HEADER ─── -->
  <header>
    <div class="logo">Re<span>:</span>Anime</div>
    <div class="header-right">
      <button id="theme-toggle-btn" onclick="toggleTheme()">☀ Tema</button>
      <a id="login-btn" href="#">Discord</a>
      <div id="user-info" class="hidden">
        <div id="user-popup"></div>
      </div>
    </div>
  </header>

  <!-- ─── INTRO / HERO ─── -->
  <section id="intro">
    <div class="hero-bg"></div>
    <div class="hero-lines"></div>

  <script>
  /* ══════════════════════════════════════════════
     AUTH / THEME
  ══════════════════════════════════════════════ */
  const clientId = "1390810180823945350";
  const redirectUri = "https://imram-software.github.io/ReAnime/callback.html";
  document.getElementById('login-btn').href =
    `https://discord.com/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify`;

  const savedUser = JSON.parse(localStorage.getItem('user'));
  if (savedUser) {
    document.getElementById('login-btn').classList.add('hidden');
    const userInfo = document.getElementById('user-info');
    userInfo.classList.remove('hidden');
    const av = `https://cdn.discordapp.com/avatars/${savedUser.id}/${savedUser.avatar}.png`;
    userInfo.innerHTML = `

        <button onclick="localStorage.removeItem('user');location.reload()">Cerrar sesión</button>
      `;
    };
  }

  const savedTheme = localStorage.getItem('theme') || 'dark';
  if (savedTheme === 'light') document.body.classList.add('light');

  function toggleTheme() {
    document.body.classList.toggle('light');
    localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    document.getElementById('theme-toggle-btn').textContent =
      document.body.classList.contains('light') ? '🌙 Tema' : '☀ Tema';
  }

  /* ══════════════════════════════════════════════
     APP STATE
  ══════════════════════════════════════════════ */
  let allAnimes = [];
  let activeGenres = new Set();

  const urlParams = new URLSearchParams(location.search);
  const genreFromURL = urlParams.get('genre');
  const animeIdFromURL = urlParams.get('id');

  /* ══════════════════════════════════════════════
     ENTER
  ══════════════════════════════════════════════ */
  document.getElementById('enter-btn').addEventListener('click', () => {
    const intro = document.getElementById('intro');
    const app = document.getElementById('app');
    // Play music
    const music = document.getElementById('bg-music');
    if (music) { music.volume = 0.12; music.play().catch(()=>{}); }

    intro.style.transition = 'opacity 0.5s, transform 0.5s';
    intro.style.opacity = '0';
    intro.style.transform = 'scale(0.97)';
    setTimeout(() => {
      intro.style.display = 'none';
      app.style.display = 'block';
      app.classList.add('fade-enter');
      loadApp();
    }, 500);
  });

  /* ══════════════════════════════════════════════
     LOAD APP
  ══════════════════════════════════════════════ */
  function loadApp() {
    loadNews();
    fetch('animes.json')
      .then(r => r.json())
      .then(data => {
        allAnimes = data;
        buildGenreChips();
        if (genreFromURL) {
          activeGenres.add(decodeURIComponent(genreFromURL));
          document.querySelectorAll('.genre-chip').forEach(c => {
            if (c.dataset.genre === decodeURIComponent(genreFromURL)) c.classList.add('active');
          });
        }
        if (animeIdFromURL) {
          const anime = allAnimes.find(a => a.id === animeIdFromURL);
          anime ? showDetail(anime) : renderAnimes(filterList());
        } else {
          renderAnimes(filterList());
        }
      })
      .catch(() => {
        document.getElementById('anime-directory').innerHTML =
          '<div class="empty-state"><p>Error cargando datos.</p></div>';
      });
  }

  /* ══════════════════════════════════════════════
     NEWS
  ══════════════════════════════════════════════ */
  let newsIndex = 0;
  let newsCards = 0;
  const CARD_W = 352; // 340 + 12 gap

  async function loadNews() {
    const track = document.getElementById('news-track');
    const query = `query($p:Int,$pp:Int){Page(page:$p,perPage:$pp){media(sort:START_DATE_DESC,type:ANIME){id title{romaji english}coverImage{large}startDate{year month day}description(asHtml:false)siteUrl}}}`;
    try {
      const res = await fetch('https://graphql.anilist.co', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables: { p: 1, pp: 8 } })
      });
      const data = await res.json();
      track.innerHTML = '';
      data.data.Page.media.forEach(anime => {
        const card = document.createElement('div');
        card.className = 'news-card';
        const desc = anime.description
          ? anime.description.replace(/<[^>]*>/g, '').slice(0, 110) + '…'
          : 'Sin descripción.';
        const date = `${anime.startDate.year || '?'}-${String(anime.startDate.month || '?').padStart(2,'0')}`;
        card.innerHTML = `
          <a href="${anime.siteUrl}" target="_blank">
            <img src="${anime.coverImage.large}" alt="${anime.title.romaji}" loading="lazy" />
            <div class="news-card-body">
              <h3>${anime.title.english || anime.title.romaji}</h3>
              <p>${desc}</p>
              <small>${date}</small>
            </div>
          </a>
        `;
        track.appendChild(card);
      });
      newsCards = track.children.length;
    } catch {
      track.innerHTML = '<div style="padding:2rem;color:var(--muted)">No se pudieron cargar las noticias.</div>';
    }
  }

  document.getElementById('news-prev').onclick = () => {
    newsIndex = Math.max(0, newsIndex - 1);
    document.getElementById('news-track').style.transform = `translateX(-${newsIndex * CARD_W}px)`;
  };
  document.getElementById('news-next').onclick = () => {
    if (newsIndex < newsCards - 1) newsIndex++;
    document.getElementById('news-track').style.transform = `translateX(-${newsIndex * CARD_W}px)`;
  };

  /* ══════════════════════════════════════════════
     GENRES
  ══════════════════════════════════════════════ */
  function buildGenreChips() {
    const container = document.getElementById('genre-chips');
    const genres = Array.from(new Set(allAnimes.flatMap(a => a.genre))).sort();
    container.innerHTML = '';
    genres.forEach(g => {
      const chip = document.createElement('button');
      chip.className = 'genre-chip';
      chip.dataset.genre = g;
      chip.textContent = g;
      chip.addEventListener('click', () => {
        chip.classList.toggle('active');
        activeGenres.has(g) ? activeGenres.delete(g) : activeGenres.add(g);
        renderAnimes(filterList());
      });
      container.appendChild(chip);
    });
  }

  function filterList() {
    const term = document.getElementById('search-input').value.toLowerCase();
    return allAnimes.filter(a =>
      a.name.toLowerCase().includes(term) &&
      (activeGenres.size === 0 || [...activeGenres].some(g => a.genre.includes(g)))
    );
  }

  document.getElementById('search-input').addEventListener('input', () => renderAnimes(filterList()));

  /* ══════════════════════════════════════════════
     RENDER
  ══════════════════════════════════════════════ */
  function renderAnimes(list) {
    const dir = document.getElementById('anime-directory');
    document.getElementById('anime-count').textContent = `${list.length} títulos`;
    dir.innerHTML = '';
    if (!list.length) {
      dir.innerHTML = '<div class="empty-state"><p>Sin resultados para tu búsqueda.</p></div>';
      return;
    }
    list.forEach(a => {
      const card = document.createElement('div');
      card.className = 'anime-card';
      card.innerHTML = `
        <img src="${a.cover}" alt="${a.name}" loading="lazy" />
        <div class="anime-card-overlay">
          <div class="anime-card-title">${a.name}</div>
          <div class="anime-card-genre">${(a.genre||[]).slice(0,2).join(' · ')}</div>
        </div>
      `;
      card.addEventListener('click', () => {
        window.location.href = `anime.html?id=${encodeURIComponent(a.id)}`;
      });
      dir.appendChild(card);
    });
  }

  /* ══════════════════════════════════════════════
     DETAIL
  ══════════════════════════════════════════════ */
  function showDetail(anime) {
    document.getElementById('anime-directory').style.display = 'none';
    document.getElementById('anime-details').style.display = 'block';
    document.querySelector('.filter-bar').style.display = 'none';
    document.querySelector('.section-header').style.display = 'none';

    document.getElementById('detail-cover-img').src = anime.cover || '';
    document.getElementById('detail-name').textContent = anime.name;
    document.getElementById('detail-description').textContent = anime.description || 'Sin descripción.';

    const genreWrap = document.getElementById('detail-genres');
    genreWrap.innerHTML = (anime.genre||[]).map(g =>
      `<span class="detail-genre-tag">${g}</span>`
    ).join('');

    const epList = document.getElementById('episode-list');
    const vidPlayer = document.getElementById('video-player');
    epList.innerHTML = ''; vidPlayer.innerHTML = '';

    if (anime.episodes?.length) {
      anime.episodes.forEach((ep, i) => {
        const btn = document.createElement('button');
        btn.textContent = `${ep.number}. ${ep.title}`;
        btn.addEventListener('click', () => {
          epList.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const tmp = document.createElement('div'); tmp.innerHTML = ep.embed;
          const iframe = tmp.querySelector('iframe');
          vidPlayer.innerHTML = '';
          const wrap = document.createElement('div'); wrap.className = 'video-container';
          if (iframe) {
            iframe.removeAttribute('width'); iframe.removeAttribute('height');
            wrap.appendChild(iframe);
          } else { wrap.innerHTML = ep.embed; }
          vidPlayer.appendChild(wrap);
        });
        epList.appendChild(btn);
        if (i === 0) btn.click();
      });
    } else {
      epList.innerHTML = '<span style="color:var(--muted);font-size:0.85rem">Sin episodios disponibles.</span>';
    }
  }

  document.getElementById('detail-back-btn').addEventListener('click', () => {
    document.getElementById('anime-details').style.display = 'none';
    document.getElementById('anime-directory').style.display = 'grid';
    document.querySelector('.filter-bar').style.display = 'flex';
    document.querySelector('.section-header').style.display = 'flex';
  });

  /* ══════════════════════════════════════════════════════════════
   RAM — ASISTENTE (Re:Zero character, sin emojis)
   Bugs corregidos:
   - "no se" ya no se trata como "no"
   - popular list ahora setea pending correctamente
   - "no" en ask_genre ya no intenta buscar genero "no"
   - pending 'confirm_popular' maneja la seleccion de lista
══════════════════════════════════════════════════════════════ */

/* ─── MEMORIA ─── */
const ram = {
  memory: {
    name:            null,
    likedGenres:     [],
    dislikedGenres:  [],
    seenAnimes:      [],
    lastRecommended: null,
    lastGenreAsked:  null,
    lastPopularList: [],
    sessionCount:    0,
    mood:            null,
  },
  pending: null,
  /*
    Valores posibles de pending:
    'confirm_rec'     → pregunto si quiere recomendacion
    'confirm_another' → pregunto si quiere otra
    'confirm_goto'    → pregunto si quiere ir al anime recomendado
    'confirm_popular' → mostro lista popular, espera seleccion
    'ask_genre'       → pregunto que genero quiere
    'ask_name'        → pregunto el nombre
    'confirm_good'    → pregunto si le gusto la recomendacion
  */
};

/* ─── DOM ─── */
const mascotCont   = document.getElementById('mascot-container');
const mascotImg    = document.getElementById('mascot-img');
const mascotSpeech = document.getElementById('mascot-speech');
const mascotChat   = document.getElementById('mascot-chat');
const chatMessages = document.getElementById('mascot-chat-messages');
const chatInput    = document.getElementById('mascot-chat-input');

const chatClose    = document.getElementById('mascot-chat-close');

/* ─── WALK ─── */
let mPos = 10, mDir = 1;

  if (mPos > 75) mDir = -1;
  if (mPos < 5)  mDir =  1;

  mascotImg.style.transform = `scaleX(${mDir})`;
}
setInterval(walkMascot, 30);

/* ─── BURBUJAS INACTIVAS ─── */
const idleBubbles = [
  'Haz clic si necesitas ayuda.',
  'Puedo recomendarte un anime.',
  'No te quedes mirando el catalogo solo.',
  'Tengo buenos criterios. Preguntame.',
  'Soy Ram. Estoy aqui si me necesitas.',
  'Puedo filtrar por genero si quieres.',
];
setInterval(() => {
  if (mascotChat.classList.contains('hidden')) {

}, 9000);

/* ─── ABRIR / CERRAR ─── */
mascotImg.onclick = () => {
  mascotChat.classList.remove('hidden');
  ram.memory.sessionCount++;
  chatMessages.innerHTML = '';

  if (ram.memory.sessionCount === 1) {
    ramSay('Soy Ram. Puedo recomendarte animes o buscar por genero.');

      ramSay('¿Quieres que te recomiende algo ahora?', 500);

};

chatClose.onclick = () => {
  mascotChat.classList.add('hidden');
  ram.pending = null;
  clearGoBtn();
  clearQuickReplies();
};

/* ─── SEND ─── */
chatSend.onclick = sendChat;
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

function sendChat() {
  const v = chatInput.value.trim();
  if (!v) return;
  addMsg(v, true);
  chatInput.value = '';
  clearQuickReplies();
  handleChat(v);
}

/* ─── QUICK REPLIES ─── */
function showQuickReplies(options) {
  clearQuickReplies();
  const wrap = document.createElement('div');
  wrap.id = 'quick-replies';
  wrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.5rem;';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.textContent = opt;
    btn.style.cssText = `
      background:var(--bg3); border:1px solid var(--border);
      color:var(--rose); border-radius:20px; padding:0.3rem 0.75rem;
      font-size:0.75rem; cursor:pointer; font-family:var(--font-body);
      transition:all 0.2s;
    `;
    btn.onmouseover = () => { btn.style.borderColor = 'var(--pink)'; btn.style.color = 'var(--pink)'; };
    btn.onmouseout  = () => { btn.style.borderColor = 'var(--border)'; btn.style.color = 'var(--rose)'; };
    btn.onclick = () => {
      addMsg(opt, true);
      clearQuickReplies();
      handleChat(opt);
    };
    wrap.appendChild(btn);
  });
  chatActions.insertBefore(wrap, chatActions.firstChild);
}

function clearQuickReplies() {
  const old = document.getElementById('quick-replies');
  if (old) old.remove();
}

/* ─── GO BTN ─── */
function showGoBtn(anime) {
  clearGoBtn();
  const btn = document.createElement('button');
  btn.id = 'mascot-go-btn';
  btn.textContent = `Ir a "${anime.name}"`;
  btn.style.cssText = `
    background:var(--pink); border:none; color:#fff; border-radius:6px;
    padding:0.45rem 0.9rem; cursor:pointer; font-size:0.8rem;
    font-family:var(--font-body); font-weight:700; width:100%;
    margin-bottom:0.3rem; transition:opacity 0.2s;
  `;
  btn.onmouseover = () => btn.style.opacity = '0.85';
  btn.onmouseout  = () => btn.style.opacity = '1';
  btn.onclick = () => window.location.href = `anime.html?id=${anime.id}`;
  chatActions.insertBefore(btn, chatActions.firstChild);
}
function clearGoBtn() {
  const old = document.getElementById('mascot-go-btn');
  if (old) old.remove();
}

/* ─── MESSAGES ─── */
function addMsg(text, isUser) {
  const d = document.createElement('div');
  d.className = `chat-msg ${isUser ? 'user' : 'bot'}`;
  d.innerHTML = `<b>${isUser ? 'Tu' : 'Ram'}:</b> ${text}`;
  chatMessages.appendChild(d);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
function ramSay(text, delay = 0) {
  if (delay) setTimeout(() => addMsg(text, false), delay);
  else addMsg(text, false);
}

/* ─── PATRONES ─── */
// UNSURE debe chequearse ANTES que NO para evitar falsos negativos con "no se"
const UNSURE = /^(no s[eé]|ni idea|no tengo idea|no estoy seguro|quizas|no lo se|no lo sé|hmm|mm|umm|tal vez|quiz[aá]s)/i;
// NO solo matchea respuestas negativas claras, no frases con "no" en medio
const YES    = /^(s[ií]$|sip|claro|dale|ok|okay|anda|por favor|ofc|obvio|bueno|va$|venga|yes|yep|sure|quiero|podría|me gustaría|si!|sí!)/i;
const NO     = /^(no$|nel$|nop$|nope$|no gracias|no quiero|paso$|nah$|never$|jam[aá]s$|mejor no)/i;
const BAD    = ['puta','mierda','pendejo','idiot','imbecil','fuck','shit','bitch','asshole','hdp','ojete'];

/* ─── UTILIDADES ─── */
function pickAnime(genreFilter = null, exclude = []) {
  let pool = allAnimes.filter(a => !exclude.includes(a.id));
  if (genreFilter) {
    const gpool = pool.filter(a => a.genre.map(g => g.toLowerCase()).includes(genreFilter.toLowerCase()));
    if (gpool.length) pool = gpool;
  }
  if (!pool.length) pool = allAnimes;
  return pool[Math.floor(Math.random() * pool.length)];
}

function detectGenre(msg) {
  if (!allAnimes.length) return null;
  const all = Array.from(new Set(allAnimes.flatMap(a => a.genre.map(g => g.toLowerCase()))));
  return all.find(g => msg.toLowerCase().includes(g)) || null;
}

function detectMood(msg) {
  if (/(aburr|bored|no s[eé] qu[eé] ver)/i.test(msg)) return 'bored';
  if (/(triste|sad|mal d[ií]a|depre)/i.test(msg))      return 'sad';
  if (/(feliz|contento|buenas|excelente)/i.test(msg))   return 'happy';
  if (/(estresad|cansad|tired|exhaust)/i.test(msg))     return 'stressed';
  return null;
}

function buildGenreQuickReplies() {
  if (!allAnimes.length) return;
  const all = Array.from(new Set(allAnimes.flatMap(a => a.genre))).sort();
  const preferred = ram.memory.likedGenres.slice(0, 2);
  const rest = all.filter(g => !preferred.includes(g)).slice(0, 4 - preferred.length);
  showQuickReplies([...preferred, ...rest].slice(0, 4));
}

function giveAnotherRec() {
  const g = ram.memory.lastGenreAsked || (ram.memory.likedGenres[0] || null);
  const avoidIds = [
    ...ram.memory.seenAnimes,
    ...allAnimes
      .filter(a => a.genre.map(x => x.toLowerCase()).some(x => ram.memory.dislikedGenres.includes(x)))
      .map(a => a.id),
  ];
  const pick = pickAnime(g, avoidIds);
  ram.memory.lastRecommended = pick;
  ram.memory.seenAnimes.push(pick.id);
  const prefix = g ? `Otro de <b>${g}</b>: ` : '';
  ramSay(`${prefix}<b>${pick.name}</b>. ¿Que te parece?`);
  showGoBtn(pick);
  setTimeout(() => {
    ram.pending = 'confirm_good';
    showQuickReplies(['Me interesa', 'Dame otro', 'Buscar otro genero', 'No gracias']);
  }, 400);
}

/* ═══════════════════════════════════════════════════════
   HANDLER PRINCIPAL
═══════════════════════════════════════════════════════ */
function handleChat(rawInput) {
  const msg = rawInput.trim();
  const lo  = msg.toLowerCase();

  /* Groserías */
  if (BAD.some(w => lo.includes(w))) {
    ramSay('No voy a responder a eso.');
    ram.pending = null;
    return;
  }

  /* ─── PENDING ─── */
  if (ram.pending) {

    /* confirm_rec */
    if (ram.pending === 'confirm_rec') {
      if (UNSURE.test(msg)) {
        ramSay('No importa. Dime que genero te gusta y lo resuelvo.');
        ram.pending = 'ask_genre';
        buildGenreQuickReplies();
        return;
      }
      if (YES.test(msg)) {
        ram.pending = null;
        if (ram.memory.likedGenres.length) {
          const g = ram.memory.likedGenres[Math.floor(Math.random() * ram.memory.likedGenres.length)];
          const pick = pickAnime(g, ram.memory.seenAnimes);
          ram.memory.lastRecommended = pick;
          ram.memory.seenAnimes.push(pick.id);
          ramSay(`Recuerdo que te gusta el <b>${g}</b>. Te recomiendo: <b>${pick.name}</b>.`);
          showGoBtn(pick);
          setTimeout(() => {
            ram.pending = 'confirm_good';
            showQuickReplies(['Me interesa', 'Dame otro', 'No gracias']);
          }, 400);
        } else {
          ramSay('Bien. ¿Tienes algun genero favorito?');
          ram.pending = 'ask_genre';
          buildGenreQuickReplies();
        }
        return;
      }
      if (NO.test(msg)) {
        ram.pending = null;
        ramSay('Como quieras. Aqui estare.');
        showQuickReplies(['Busco por genero', 'Ver los populares', 'Cuantos animes hay']);
        return;
      }
      /* No matcheo YES/NO/UNSURE → limpiar pending y caer al flujo libre */
      ram.pending = null;
    }

    /* ask_genre */
    if (ram.pending === 'ask_genre') {
      /* Chequear UNSURE y NO antes de detectar genero */
      if (UNSURE.test(msg) || NO.test(msg)) {
        ram.pending = null;
        const pick = pickAnime(null, ram.memory.seenAnimes);
        ram.memory.lastRecommended = pick;
        ram.memory.seenAnimes.push(pick.id);
        ramSay(`Sin preferencia. Te recomiendo: <b>${pick.name}</b>.`);
        showGoBtn(pick);
        setTimeout(() => {
          ram.pending = 'confirm_good';
          showQuickReplies(['Me interesa', 'Dame otro', 'No gracias']);
        }, 400);
        return;
      }
      const g = detectGenre(lo);
      if (g) {
        if (!ram.memory.likedGenres.includes(g)) ram.memory.likedGenres.push(g);
        ram.memory.lastGenreAsked = g;
        const pick = pickAnime(g, ram.memory.seenAnimes);
        ram.memory.lastRecommended = pick;
        ram.memory.seenAnimes.push(pick.id);
        ram.pending = null;
        ramSay(`Para <b>${g}</b>: <b>${pick.name}</b>.`);
        showGoBtn(pick);
        setTimeout(() => {
          ram.pending = 'confirm_goto';
          showQuickReplies(['Si, lo veo', 'Dame otro', 'Cambiar genero']);
        }, 400);
        return;
      }
      ramSay('No encontre ese genero. Elige uno de estos.');
      buildGenreQuickReplies();
      return;
    }

    /* confirm_goto */
    if (ram.pending === 'confirm_goto') {
      if (YES.test(msg) && ram.memory.lastRecommended) {
        window.location.href = `anime.html?id=${ram.memory.lastRecommended.id}`;
        return;
      }
      if (/otro|another|mas|más|diferente/i.test(msg)) {
        ram.pending = null;
        giveAnotherRec();
        return;
      }
      if (/genero|género|cambiar/i.test(msg)) {
        ram.pending = 'ask_genre';
        ramSay('¿Que genero quieres?');
        buildGenreQuickReplies();
        return;
      }
      if (NO.test(msg)) {
        ram.pending = null;
        ramSay('Bien. Cuando quieras, estoy aqui.');
        showQuickReplies(['Dame otro', 'Cambiar genero', 'Gracias']);
        return;
      }
      ram.pending = null;
      /* Caer al flujo libre con el mensaje original */
    }

    /* confirm_popular */
    if (ram.pending === 'confirm_popular') {
      if (NO.test(msg)) {
        ram.pending = null;
        ramSay('Como quieras. ¿Prefieres que busque por genero?');
        showQuickReplies(['Si, busca por genero', 'Recomiendame algo', 'No gracias']);
        return;
      }
      if (YES.test(msg)) {
        if (ram.memory.lastPopularList.length) {
          ram.pending = null;
          window.location.href = `anime.html?id=${ram.memory.lastPopularList[0].id}`;
        }
        return;
      }
      /* Numero */
      const num = parseInt(lo);
      if (!isNaN(num) && num >= 1 && num <= ram.memory.lastPopularList.length) {
        ram.pending = null;
        window.location.href = `anime.html?id=${ram.memory.lastPopularList[num - 1].id}`;
        return;
      }
      /* Nombre parcial de la lista */
      const named = ram.memory.lastPopularList.find(a =>
        lo.includes(a.name.toLowerCase().slice(0, 8))
      );
      if (named) {
        ram.pending = null;
        window.location.href = `anime.html?id=${named.id}`;
        return;
      }
      ram.pending = null;
      /* Caer al flujo libre */
    }

    /* confirm_another */
    if (ram.pending === 'confirm_another') {
      if (YES.test(msg) || /otro|another|mas|más/i.test(msg)) {
        ram.pending = null;
        giveAnotherRec();
        return;
      }
      if (NO.test(msg)) {
        ram.pending = null;
        ramSay('Bien. Espero que lo disfrutes.');
        showQuickReplies(['Dame otro anime', 'Buscar otro genero']);
        return;
      }
      ram.pending = null;
    }

    /* confirm_good */
    if (ram.pending === 'confirm_good') {
      ram.pending = null;
      if (/(encantó|encanté|amé|me gustó|me gusto|genial|buenísimo|buenisimo|perfecto|interesa|me interesa|bien$|bueno$)/i.test(lo)) {
        const g = ram.memory.lastRecommended?.genre?.[0]?.toLowerCase();
        if (g && !ram.memory.likedGenres.includes(g)) ram.memory.likedGenres.push(g);
        ramSay(`Bien. Tomo nota de que te gusta el <b>${g || 'ese estilo'}</b>.`);
        setTimeout(() => {
          ramSay('¿Quieres otro parecido?', 400);
          ram.pending = 'confirm_another';
          setTimeout(() => showQuickReplies(['Si, otro', 'No por ahora']), 500);
        }, 200);
        return;
      }
      if (/(no era|no me gusto|no me gustó|malo|aburrido|meh|regular)/i.test(lo)) {
        const g = ram.memory.lastRecommended?.genre?.[0]?.toLowerCase();
        if (g && !ram.memory.dislikedGenres.includes(g)) ram.memory.dislikedGenres.push(g);
        ramSay('Lo anoto para no repetirlo. ¿Buscamos algo diferente?');
        setTimeout(() => {
          ram.pending = 'confirm_rec';
          showQuickReplies(['Si, prueba otro', 'Buscar por genero', 'No gracias']);
        }, 200);
        return;
      }
      if (/(aún no|todavia|todavía|despues|después|after|not yet)/i.test(lo)) {
        ramSay('Sin apuro. Aqui estare cuando lo termines.');
        showQuickReplies(['Dame otro', 'Buscar genero']);
        return;
      }
      if (/otro|dame otro|another/i.test(lo)) {
        giveAnotherRec();
        return;
      }
      if (NO.test(msg)) {
        ramSay('Entendido. Avisame si quieres mas.');
        showQuickReplies(['Dame otro', 'Buscar por genero']);
        return;
      }
      ramSay('Entendido. Avisame si quieres mas recomendaciones.');
      showQuickReplies(['Dame otro', 'Buscar por genero']);
      return;
    }

    /* ask_name */
    if (ram.pending === 'ask_name') {
      ram.pending = null;
      const name = msg.split(' ')[0];
      ram.memory.name = name.charAt(0).toUpperCase() + name.slice(1);
      ramSay(`${ram.memory.name}. Bien. Ahora dime que quieres ver.`);
      setTimeout(() => {
        ram.pending = 'confirm_rec';
        showQuickReplies(['Recomiendame algo', 'Busco por genero']);
      }, 300);
      return;
    }
  }

  /* ─── FLUJO LIBRE ─── */

  /* Saludos */
  if (/^(hola|hello|hey|hi|buenas)/i.test(lo)) {
    if (ram.memory.name) {
      ramSay(`${ram.memory.name}. ¿Que necesitas?`);
      showQuickReplies(['Recomiendame algo', 'Busco por genero', 'Ver populares']);
    } else {
      ramSay('¿Como te llamas?');
      ram.pending = 'ask_name';
    }
    return;
  }

  /* Nombre */
  if (/(me llamo|soy |mi nombre es|llámame|llamame)/i.test(lo)) {
    const match = lo.match(/(?:me llamo|soy|mi nombre es|llámame|llamame)\s+(\w+)/i);
    if (match) {
      ram.pending = null;
      const name = match[1].charAt(0).toUpperCase() + match[1].slice(1);
      ram.memory.name = name;
      ramSay(`${name}. Lo recordare.`);
      setTimeout(() => {
        ram.pending = 'confirm_rec';
        showQuickReplies(['Recomiendame algo', 'Busco por genero']);
      }, 300);
      return;
    }
  }

  /* Mood */
  const mood = detectMood(lo);
  if (mood && mood !== ram.memory.mood) {
    ram.memory.mood = mood;
    const moodMap = {
      bored:    ['Para el aburrimiento hay una solucion directa: un buen anime. ¿Quieres que elija?', 'confirm_rec',  ['Si', 'Algo corto', 'Busco por genero']],
      sad:      ['¿Algo reconfortante o prefieres accion para despejarte?',                           'ask_genre',    ['Romance', 'Comedia', 'Accion', 'Slice of Life']],
      happy:    ['Bien. ¿Lo celebramos con un buen anime?',                                           'confirm_rec',  ['Si, va', 'Algo epico', 'Algo tranquilo']],
      stressed: ['Entonces necesitas algo tranquilo. ¿Te busco un anime relajante?',                  'confirm_rec',  ['Si', 'Prefiero accion', 'No gracias']],
    };
    const [reply, pend, qr] = moodMap[mood];
    ramSay(reply);
    ram.pending = pend;
    setTimeout(() => showQuickReplies(qr), 300);
    return;
  }

  /* Generos disponibles */
  if (/(género|genero|tipos|categoría|categorias|que generos|cuales son)/i.test(lo)) {
    const all = Array.from(new Set(allAnimes.flatMap(a => a.genre))).sort();
    ramSay(`Generos disponibles: <b>${all.join(', ')}</b>.`);
    setTimeout(() => {
      ramSay('¿Quieres buscar por alguno?', 400);
      ram.pending = 'ask_genre';
      buildGenreQuickReplies();
    }, 200);
    return;
  }

  /* Genero detectado en el mensaje */
  const foundGenre = detectGenre(lo);
  if (foundGenre) {
    if (!ram.memory.likedGenres.includes(foundGenre)) ram.memory.likedGenres.push(foundGenre);
    ram.memory.lastGenreAsked = foundGenre;
    const pick = pickAnime(foundGenre, ram.memory.seenAnimes);
    ram.memory.lastRecommended = pick;
    ram.memory.seenAnimes.push(pick.id);
    ramSay(`Para <b>${foundGenre}</b>: <b>${pick.name}</b>.`);
    showGoBtn(pick);
    setTimeout(() => {
      ram.pending = 'confirm_goto';
      showQuickReplies(['Si, lo veo', 'Dame otro', 'Cambiar genero']);
    }, 400);
    return;
  }

  /* Recomendacion explícita */
  if (/(recomiéndame|recomienda|dame|quiero ver|ponme|muéstrame|anime|suggestion|what to watch)/i.test(lo)) {
    if (ram.memory.likedGenres.length) {
      ramSay(`Tus generos guardados: <b>${ram.memory.likedGenres.join(', ')}</b>. ¿Busco dentro de eso o algo nuevo?`);
      showQuickReplies([
        ...ram.memory.likedGenres.slice(0, 3).map(g => g.charAt(0).toUpperCase() + g.slice(1)),
        'Sorprendeme'
      ]);
      ram.pending = 'ask_genre';
    } else {
      ramSay('¿Tienes algun genero favorito?');
      ram.pending = 'ask_genre';
      buildGenreQuickReplies();
    }
    return;
  }

  /* Otro */
  if (/(^otro$|^otra$|one more|another|una más|uno más|diferente|siguiente)/i.test(lo)) {
    giveAnotherRec();
    return;
  }

  /* Popular */
  if (/(popular|trending|top|mejor|mejores|populares|los mas vistos)/i.test(lo)) {
    ramSay('Estos son algunos de los mas vistos:');
    const tops = allAnimes.slice(0, 3);
    ram.memory.lastPopularList = tops;
    tops.forEach((a, i) => {
      setTimeout(() => ramSay(`${i + 1}. <b>${a.name}</b>`), i * 250);
    });
    setTimeout(() => {
      ramSay('¿Quieres ir a alguno? Dime el numero.', tops.length * 250 + 100);
      ram.pending = 'confirm_popular';
      setTimeout(() => {
        showGoBtn(tops[0]);
        showQuickReplies([...tops.map((a, i) => `${i + 1}. ${a.name.slice(0, 14)}`), 'No gracias']);
      }, tops.length * 250 + 200);
    }, tops.length * 100);
    return;
  }

  /* Quien es Ram */
  if (/(quién eres|quien eres|eres ram|eres real|que eres|cómo te llamas|como te llamas)/i.test(lo)) {
    ramSay('Soy Ram. Tu asistente en Re:Anime.');
    setTimeout(() => ramSay('Puedo recomendarte animes y recordar tus preferencias.', 300), 100);
    if (ram.memory.likedGenres.length) {
      setTimeout(() => ramSay(`Hasta ahora se que te gusta: <b>${ram.memory.likedGenres.join(', ')}</b>.`, 700), 400);
    }
    return;
  }

  /* Cuantos animes */
  if (/(cuántos|cuantos|how many)/i.test(lo)) {
    ramSay(`Hay <b>${allAnimes.length}</b> animes en el catalogo.`);
    setTimeout(() => {
      ram.pending = 'confirm_rec';
      showQuickReplies(['Recomiendame uno', 'Busco por genero']);
    }, 300);
    return;
  }

  /* Gracias */
  if (/(gracias|thanks|thank you|eres la mejor|te quiero|te amo)/i.test(lo)) {
    ramSay(ram.memory.name
      ? `De nada, ${ram.memory.name}. Si necesitas algo mas, estoy aqui.`
      : 'De nada. Estoy aqui si necesitas algo mas.');
    showQuickReplies(['Dame otro anime', 'Cambiar genero', 'No, ya estoy bien']);
    return;
  }

  /* Despedida */
  if (/(adiós|adios|bye|chau|hasta luego|nos vemos|ciao)/i.test(lo)) {
    ramSay(ram.memory.name ? `Hasta luego, ${ram.memory.name}.` : 'Hasta luego.');
    setTimeout(() => mascotChat.classList.add('hidden'), 1400);
    return;
  }

  /* Fallback */
  ramSay('No entendi. Dime que buscas y lo resuelvo.');
  showQuickReplies(['Recomiendame algo', 'Busco por genero', 'Ver los populares', 'Que generos hay']);
}

  /* ══════════════════════════════════════════════
     IF URL HAS PARAMS, SKIP INTRO
  ══════════════════════════════════════════════ */
  if (genreFromURL || animeIdFromURL) {
    document.getElementById('intro').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadApp();
  }
  </script>
</body>
