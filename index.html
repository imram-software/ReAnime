<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Re:Anime</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet" />
  <style>
    /* ─────────────────────────────────────────
       TOKENS & RESET
    ───────────────────────────────────────── */
    :root {
      --bg:        #080808;
      --bg2:       #111111;
      --bg3:       #1a1a1a;
      --surface:   #161616;
      --border:    #222222;
      --pink:      #ff2d78;
      --pink-dim:  #ff2d7822;
      --pink-glow: #ff2d7855;
      --rose:      #ff6fa8;
      --text:      #e8e8e8;
      --muted:     #666;
      --radius:    10px;
      --font-head: 'Bebas Neue', cursive;
      --font-body: 'DM Sans', sans-serif;
      --font-jp:   'Noto Sans JP', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 2px; }

    /* ─────────────────────────────────────────
       NOISE OVERLAY (texture)
    ───────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.4;
    }

    /* ─────────────────────────────────────────
       HEADER
    ───────────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      background: rgba(8,8,8,0.95);
      /* backdrop-filter solo en dispositivos capaces */
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--font-head);
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--pink);
      text-shadow: 0 0 20px var(--pink-glow);
      user-select: none;
    }

    .logo span { color: var(--text); }

    .header-right {
      display: flex; align-items: center; gap: 1rem;
    }

    #theme-toggle-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: 0.35rem 0.7rem; font-size: 0.8rem;
      cursor: pointer; transition: all 0.2s;
      font-family: var(--font-body);
    }
    #theme-toggle-btn:hover { border-color: var(--pink); color: var(--pink); }

    #login-btn {
      background: var(--pink); color: #fff;
      padding: 0.4rem 1.1rem; border-radius: 6px;
      text-decoration: none; font-size: 0.85rem;
      font-weight: 700; letter-spacing: 0.5px;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 16px var(--pink-glow);
    }
    #login-btn:hover { opacity: 0.85; }

    #user-info {
      display: flex; align-items: center; gap: 0.5rem;
      cursor: pointer; position: relative;
    }
    #user-info img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--pink); }
    #user-info span { font-size: 0.85rem; color: var(--text); }

    #user-popup {
      position: absolute; top: 44px; right: 0;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem;
      min-width: 180px; display: none; z-index: 100;
    }
    #user-popup button {
      display: block; width: 100%; margin-top: 0.5rem;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 0.5rem;
      cursor: pointer; font-family: var(--font-body); font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    #user-popup button:hover { border-color: var(--pink); color: var(--pink); }

    /* ─────────────────────────────────────────
       INTRO / HERO
    ───────────────────────────────────────── */
    #intro {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      position: relative; overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 60%, #ff2d7812 0%, transparent 70%);
    }

    /* Decorative Japanese-style grid lines */
    .hero-lines {
      position: absolute; inset: -60px; z-index: 0;
      overflow: hidden;
    }
    .hero-lines::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,45,120,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,45,120,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      will-change: transform;
      animation: gridDrift 6s linear infinite;
    }
    @keyframes gridDrift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(60px, -60px); }
    }

    .hero-badge {
      font-family: var(--font-jp);
      font-size: 0.7rem; letter-spacing: 4px;
      color: var(--pink); text-transform: uppercase;
      border: 1px solid var(--pink-dim);
      padding: 0.3rem 1rem; border-radius: 30px;
      margin-bottom: 1.5rem; position: relative; z-index: 1;
    }

    #intro h1 {
      font-family: var(--font-head);
      font-size: clamp(5rem, 15vw, 11rem);
      line-height: 0.9;
      letter-spacing: 8px;
      color: var(--text);
      position: relative; z-index: 1;
    }

    #intro h1 em {
      color: var(--pink);
      font-style: normal;
      text-shadow: 0 0 40px var(--pink-glow), 0 0 80px var(--pink-dim);
    }

    .hero-sub {
      font-size: 1rem; color: var(--muted);
      margin: 1.5rem 0 2.5rem;
      max-width: 420px; line-height: 1.6;
      position: relative; z-index: 1;
    }

    .btn-enter {
      position: relative; z-index: 1;
      background: transparent;
      border: 1px solid var(--pink);
      color: var(--pink); font-family: var(--font-head);
      font-size: 1.3rem; letter-spacing: 3px;
      padding: 0.9rem 3rem; border-radius: 4px;
      cursor: pointer; overflow: hidden;
      transition: color 0.3s;
    }
    .btn-enter::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--pink);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.35s cubic-bezier(.77,0,.18,1);
      z-index: -1;
    }
    .btn-enter:hover::before { transform: scaleX(1); }
    .btn-enter:hover { color: #fff; }

    /* Scroll indicator */
    .scroll-hint {
      position: absolute; bottom: 2rem; left: 50%;
      transform: translateX(-50%); z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
    }
    .scroll-hint span { font-size: 0.65rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
    .scroll-line {
      width: 1px; height: 40px;
      background: linear-gradient(var(--pink), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%,100% { opacity: 0.3; transform: scaleY(0.7); }
      50% { opacity: 1; transform: scaleY(1); }
    }

    /* ─────────────────────────────────────────
       MAIN APP (hidden until enter)
    ───────────────────────────────────────── */
    #app { display: none; padding-top: 56px; }

    /* Section wrapper */
    .section { padding: 2rem 0 1rem; }
    .section-header {
      padding: 0 2rem 0.75rem;
      display: flex; align-items: baseline; gap: 1rem;
    }
    .section-title {
      font-family: var(--font-head);
      font-size: 2rem; letter-spacing: 3px; color: var(--text);
    }
    .section-title em { color: var(--pink); font-style: normal; }
    .section-line {
      flex: 1; height: 1px; background: var(--border);
    }
    .section-count { font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; }

    /* ─────────────────────────────────────────
       NEWS SLIDER
    ───────────────────────────────────────── */
    .news-track-wrap {
      overflow: hidden; padding: 0 2rem;
      cursor: grab; user-select: none;
    }
    .news-track-wrap.dragging { cursor: grabbing; }

    #news-track {
      display: flex; gap: 1rem;
      /* transition se aplica via JS al soltar */
    }

    /* Card — cover completo con overlay igual que anime-card */
    .news-card {
      flex: 0 0 240px;
      aspect-ratio: 2/3;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.3s, border-color 0.3s;
      background: var(--surface);
    }
    .news-card:hover { transform: translateY(-5px) scale(1.02); border-color: var(--pink); }

    .news-card > a { display: block; width: 100%; height: 100%; text-decoration: none; color: inherit; }

    .news-card-img {
      position: absolute; inset: 0;
    }
    .news-card-img img {
      width: 100%; height: 100%; object-fit: cover; object-position: top;
      display: block;
      transition: transform 0.45s, filter 0.3s;
      filter: brightness(0.85);
    }
    .news-card:hover .news-card-img img { transform: scale(1.06); filter: brightness(0.65); }

    /* Gradiente y texto — exactamente como anime-card */
    .news-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.3) 45%, transparent 70%);
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 0.9rem;
    }
    .news-card-tag {
      font-size: 0.58rem; letter-spacing: 2px;
      text-transform: uppercase; color: var(--pink);
      margin-bottom: 0.3rem;
    }
    .news-card-title {
      font-family: var(--font-head);
      font-size: 1.05rem; letter-spacing: 1px;
      line-height: 1.15; color: #fff;
      margin-bottom: 0.35rem;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }
    .news-card-desc {
      font-size: 0.72rem; color: rgba(255,255,255,0.65);
      line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .news-card:hover .news-card-desc { opacity: 1; transform: translateY(0); }
    .news-card-meta {
      font-size: 0.65rem; color: rgba(255,255,255,0.4);
      margin-top: 0.4rem;
    }

    /* Acento corner rosa igual que anime-card */
    .news-card::after {
      content: ''; position: absolute; top: 0; right: 0;
      width: 0; height: 0; border-style: solid;
      border-width: 0 24px 24px 0;
      border-color: transparent var(--pink) transparent transparent;
      opacity: 0; transition: opacity 0.3s; z-index: 2;
    }
    .news-card:hover::after { opacity: 1; }

    .slider-controls {
      display: flex; justify-content: flex-end;
      padding: 0.6rem 2rem 0; gap: 0.5rem;
    }
    .slider-btn {
      width: 36px; height: 36px;
      border: 1px solid var(--border); border-radius: 50%;
      background: none; color: var(--muted);
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .slider-btn:hover { border-color: var(--pink); color: var(--pink); }

    /* ─────────────────────────────────────────
       FILTER BAR
    ───────────────────────────────────────── */
    .filter-bar {
      padding: 0 2rem 1.5rem;
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;
    }

    #search-input {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px;
      padding: 0.55rem 1rem; font-size: 0.9rem;
      font-family: var(--font-body); outline: none;
      min-width: 220px; transition: border-color 0.2s;
    }
    #search-input::placeholder { color: var(--muted); }
    #search-input:focus { border-color: var(--pink); box-shadow: 0 0 0 2px var(--pink-dim); }

    .genre-scroll {
      display: flex; gap: 0.5rem; overflow-x: auto;
      padding-bottom: 2px; flex: 1;
    }
    .genre-scroll::-webkit-scrollbar { height: 2px; }

    .genre-chip {
      flex-shrink: 0;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--muted); border-radius: 30px;
      padding: 0.35rem 0.9rem; font-size: 0.78rem;
      cursor: pointer; user-select: none;
      transition: all 0.2s; white-space: nowrap;
      font-family: var(--font-body);
    }
    .genre-chip:hover { border-color: var(--rose); color: var(--rose); }
    .genre-chip.active { background: var(--pink); border-color: var(--pink); color: #fff; }

    /* ─────────────────────────────────────────
       ANIME GRID
    ───────────────────────────────────────── */
    #anime-directory {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      padding: 0 2rem 3rem;
      contain: layout style; /* limitar repaints al contenedor */
    }

    .anime-card {
      position: relative; overflow: hidden;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.3s, border-color 0.3s;
      aspect-ratio: 2/3;
    }
    .anime-card:hover { transform: translateY(-6px) scale(1.02); border-color: var(--pink); }

    .anime-card img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; transition: filter 0.4s;
      will-change: filter; /* aislar filter repaint del transform */
    }
    .anime-card:hover img { filter: brightness(0.6); }

    .anime-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 0.8rem;
    }

    .anime-card-title {
      font-size: 0.82rem; font-weight: 700; line-height: 1.3;
      color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    .anime-card-genre {
      font-size: 0.65rem; color: var(--pink);
      margin-top: 0.2rem; opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
      font-family: var(--font-jp);
    }
    .anime-card:hover .anime-card-genre { opacity: 1; transform: translateY(0); }

    /* Pink corner accent */
    .anime-card::after {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 28px 28px 0;
      border-color: transparent var(--pink) transparent transparent;
      opacity: 0; transition: opacity 0.3s;
    }
    .anime-card:hover::after { opacity: 1; }

    /* Empty state */
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 4rem 2rem; color: var(--muted);
    }
    .empty-state p { font-size: 1rem; }

    /* ─────────────────────────────────────────
       ANIME DETAIL PAGE
    ───────────────────────────────────────── */
    #anime-details {
      display: none; padding: 2rem;
      max-width: 1000px; margin: 0 auto;
    }

    .detail-back {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--muted); font-size: 0.85rem;
      cursor: pointer; margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .detail-back:hover { color: var(--pink); }

    .detail-header {
      display: flex; gap: 2rem;
      margin-bottom: 2rem;
    }
    .detail-cover {
      width: 180px; flex-shrink: 0;
      border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--border);
    }
    .detail-cover img { width: 100%; height: 260px; object-fit: cover; display: block; }

    .detail-meta { flex: 1; }
    .detail-meta h2 {
      font-family: var(--font-head);
      font-size: 2.5rem; letter-spacing: 3px;
      color: var(--text); margin-bottom: 0.5rem; line-height: 1;
    }
    .detail-genres {
      display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem;
    }
    .detail-genre-tag {
      font-size: 0.7rem; color: var(--pink);
      border: 1px solid var(--pink-dim);
      padding: 0.2rem 0.6rem; border-radius: 30px;
      font-family: var(--font-jp);
    }
    .detail-description {
      font-size: 0.9rem; color: var(--muted); line-height: 1.7;
    }

    .episodes-title {
      font-family: var(--font-head);
      font-size: 1.3rem; letter-spacing: 2px;
      color: var(--text); margin-bottom: 1rem;
    }

    #episode-list {
      display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem;
    }
    #episode-list button {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: 0.4rem 0.8rem; font-size: 0.8rem;
      cursor: pointer; font-family: var(--font-body);
      transition: all 0.2s;
    }
    #episode-list button:hover { border-color: var(--rose); color: var(--rose); }
    #episode-list button.active { background: var(--pink); border-color: var(--pink); color: #fff; }

    #video-player {
      width: 100%; aspect-ratio: 16/9;
      background: #000; border-radius: var(--radius);
      overflow: hidden; border: 1px solid var(--border);
      box-shadow: 0 0 40px var(--pink-dim);
      position: relative;
    }
    .video-container { width: 100%; height: 100%; position: relative; }
    .video-container iframe,
    .video-container video {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: none;
    }

    /* ─────────────────────────────────────────
       MASCOT
    ───────────────────────────────────────── */
    #mascot-container {
      position: fixed; bottom: 0; left: 10vw;
      z-index: 2000; width: 72px; pointer-events: none;
    }
    #mascot-img {
      width: 72px; height: 72px; object-fit: contain;
      cursor: pointer; pointer-events: auto;
      transition: transform 0.15s;
      /* drop-shadow removido del walk loop - se aplica solo en CSS estatico */
    }
    #mascot-img:hover { transform: scale(1.1); }

    #mascot-speech {
      position: absolute; bottom: 76px; left: 50%;
      transform: translateX(-50%);
      background: var(--bg2); color: var(--rose);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 0.5rem 0.9rem;
      font-size: 0.78rem; white-space: nowrap;
      max-width: 220px; white-space: normal;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      pointer-events: none;
      animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateX(-50%) scale(0.8); }
      to   { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    /* Chat panel */
    #mascot-chat {
      position: fixed; right: 1.5rem; bottom: 1.5rem; z-index: 3000;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 1rem;
      width: 300px; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.8rem; padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    .chat-header span { font-size: 0.85rem; font-weight: 700; color: var(--pink); }

    #mascot-chat-messages {
      height: 180px; overflow-y: auto;
      font-size: 0.83rem; line-height: 1.5;
      padding: 0.4rem; border-radius: 6px;
      margin-bottom: 0.8rem;
    }
    #mascot-chat-messages::-webkit-scrollbar { width: 2px; }

    .chat-msg { margin-bottom: 0.5rem; }
    .chat-msg.bot { color: var(--rose); }
    .chat-msg.user { color: var(--muted); text-align: right; }

    #mascot-chat-input {
      width: 100%; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: 0.45rem 0.8rem;
      font-size: 0.85rem; font-family: var(--font-body); outline: none;
      margin-bottom: 0.5rem; transition: border-color 0.2s;
    }
    #mascot-chat-input:focus { border-color: var(--pink); }

    .chat-actions { display: flex; gap: 0.5rem; }
    #mascot-chat-send {
      flex: 1; background: var(--pink); border: none;
      color: #fff; border-radius: 6px;
      padding: 0.45rem; font-weight: 700; font-size: 0.82rem;
      cursor: pointer; font-family: var(--font-body); transition: opacity 0.2s;
    }
    #mascot-chat-send:hover { opacity: 0.85; }
    #mascot-chat-close {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: 0.45rem 0.7rem; cursor: pointer; font-size: 0.8rem;
      font-family: var(--font-body); transition: all 0.2s;
    }
    #mascot-chat-close:hover { border-color: var(--pink); color: var(--pink); }

    /* ─────────────────────────────────────────
       FOOTER
    ───────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-logo { font-family: var(--font-head); font-size: 1.5rem; color: var(--pink); letter-spacing: 3px; }
    footer p { font-size: 0.78rem; color: var(--muted); }
    footer a { color: var(--rose); text-decoration: none; }
    footer a:hover { color: var(--pink); }

    /* ─────────────────────────────────────────
       UTILITIES
    ───────────────────────────────────────── */
    .hidden { display: none !important; }

    .fade-enter {
      animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Light mode override */
    body.light {
      --bg: #f5f5f5; --bg2: #ffffff; --bg3: #eeeeee;
      --surface: #ffffff; --border: #e0e0e0;
      --text: #111; --muted: #888;
      --pink-dim: #ff2d7818;
    }
    body.light .anime-card-title { color: #111; }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 600px) {
      #intro h1 { font-size: 4.5rem; }
      .detail-header { flex-direction: column; }
      .detail-cover { width: 100%; }
      .detail-cover img { height: 200px; }
      #anime-directory { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
      .news-card { flex: 0 0 180px; }
      footer { flex-direction: column; text-align: center; }
      #mascot-chat { width: calc(100vw - 2rem); right: 1rem; }
    }

    /* Dispositivos lentos o accesibilidad */
    @media (prefers-reduced-motion: reduce) {
      .hero-lines::before { animation: none; }
      .anime-card { transition: border-color 0.2s; }
      .anime-card:hover { transform: none; }
      .scroll-line { animation: none; }
      .btn-enter::before { transition: none; }
    }
    /* Deshabilitar backdrop-filter en dispositivos sin GPU suficiente */
    @media (max-width: 600px) {
      header { backdrop-filter: none; -webkit-backdrop-filter: none; background: rgba(8,8,8,0.98); }
    }
  </style>
</head>

<audio id="bg-music" src="Assets/background-theme.mp3" loop hidden></audio>

<body>

  <!-- ─── HEADER ─── -->
  <header>
    <div class="logo">Re<span>:</span>Anime</div>
    <div class="header-right">
      <button id="theme-toggle-btn" onclick="toggleTheme()">☀ Tema</button>
      <a id="login-btn" href="#">Discord</a>
      <div id="user-info" class="hidden">
        <div id="user-popup"></div>
      </div>
    </div>
  </header>

  <!-- ─── INTRO / HERO ─── -->
  <section id="intro">
    <div class="hero-bg"></div>
    <div class="hero-lines"></div>
    <div class="hero-badge">アニメ &nbsp;·&nbsp; Your next obsession</div>
    <h1>Re<em>:</em>Anime</h1>
    <p class="hero-sub">Descubre tu próximo anime favorito. Una colección curada, en constante crecimiento.</p>
    <div style="display:flex;gap:1rem;position:relative;z-index:1;flex-wrap:wrap;justify-content:center;">
      <button class="btn-enter" id="enter-btn">Entrar &nbsp;→</button>
      <a href="gacha.html" class="btn-enter" style="text-decoration:none;background:transparent;border-color:var(--rose);color:var(--rose);">Gacha &nbsp;✦</a>
    </div>
    <div class="scroll-hint">
      <span>scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- ─── APP ─── -->
  <div id="app">

    <!-- NEWS -->
    <div class="section" style="padding-bottom:0.5rem;">
      <div class="section-header">
        <h2 class="section-title">Últimas <em>noticias</em></h2>
        <div class="section-line"></div>
      </div>
      <div class="news-track-wrap">
        <div id="news-track"></div>
      </div>
      <div class="slider-controls">
        <button class="slider-btn" id="news-prev">←</button>
        <button class="slider-btn" id="news-next">→</button>
      </div>
    </div>

    <!-- GENRE + SEARCH FILTER -->
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Buscar anime…" />
      <div class="genre-scroll" id="genre-chips"></div>
    </div>

    <!-- ANIME GRID -->
    <div class="section-header" style="padding-bottom:0.5rem;">
      <h2 class="section-title">Directorio <em>anime</em></h2>
      <div class="section-line"></div>
      <span class="section-count" id="anime-count">0 títulos</span>
    </div>
    <div id="anime-directory"></div>

    <!-- ANIME DETAIL -->
    <div id="anime-details">
      <div class="detail-back" id="detail-back-btn">← Volver</div>
      <div class="detail-header">
        <div class="detail-cover">
          <img id="detail-cover-img" src="" alt="" />
        </div>
        <div class="detail-meta">
          <h2 id="detail-name"></h2>
          <div class="detail-genres" id="detail-genres"></div>
          <p class="detail-description" id="detail-description"></p>
        </div>
      </div>
      <p class="episodes-title">Episodios</p>
      <div id="episode-list"></div>
      <div id="video-player"></div>
    </div>

    <!-- FOOTER -->
    <footer>
      <div class="footer-logo">Re:Anime</div>
      <p>© 2025 Re:Anime — Proyecto de <a href="https://discord.com/users/781172416218136577" target="_blank">Ream</a></p>
    </footer>
  </div>

  <!-- ─── MASCOT ─── -->
  <div id="mascot-container">
    <img id="mascot-img" src="Assets/ReAnime-Mascot.png" alt="Ram" />
    <div id="mascot-speech" class="hidden"></div>
  </div>

  <div id="mascot-chat" class="hidden">
    <div class="chat-header">
      <span>🌸 Ram</span>
      <button id="mascot-chat-close">✕</button>
    </div>
    <div id="mascot-chat-messages"></div>
    <input id="mascot-chat-input" type="text" placeholder="Pregúntame algo…" />
    <div class="chat-actions" id="mascot-chat-actions">
      <button id="mascot-chat-send">Enviar</button>
    </div>
  </div>

  <script>
  /* ══════════════════════════════════════════════
     AUTH / THEME
  ══════════════════════════════════════════════ */
  const clientId = "1390810180823945350";
  const redirectUri = "https://imram-software.github.io/ReAnime/callback.html";
  document.getElementById('login-btn').href =
    `https://discord.com/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify`;

  const savedUser = JSON.parse(localStorage.getItem('user'));
  if (savedUser) {
    document.getElementById('login-btn').classList.add('hidden');
    const userInfo = document.getElementById('user-info');
    userInfo.classList.remove('hidden');
    const av = `https://cdn.discordapp.com/avatars/${savedUser.id}/${savedUser.avatar}.png`;
    userInfo.innerHTML = `
      <img src="${av}" />
      <span>${savedUser.username}</span>
      <div id="user-popup"></div>
    `;
    userInfo.onclick = () => {
      const p = document.getElementById('user-popup');
      p.style.display = p.style.display === 'block' ? 'none' : 'block';
      p.innerHTML = `
        <strong>${savedUser.username}</strong><br>
        <img src="${av}" width="60" style="border-radius:50%;margin:0.5rem 0"><br>
        <button onclick="window.location.href='profile.html'">Perfil</button>
        <button onclick="localStorage.removeItem('user');location.reload()">Cerrar sesión</button>
      `;
    };
  }

  const savedTheme = localStorage.getItem('theme') || 'dark';
  if (savedTheme === 'light') document.body.classList.add('light');

  function toggleTheme() {
    document.body.classList.toggle('light');
    localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    document.getElementById('theme-toggle-btn').textContent =
      document.body.classList.contains('light') ? '🌙 Tema' : '☀ Tema';
  }

  /* ══════════════════════════════════════════════
     APP STATE
  ══════════════════════════════════════════════ */
  window.allAnimes = [];
  let activeGenres = new Set(); window.activeGenres = activeGenres;

  const urlParams = new URLSearchParams(location.search);
  const genreFromURL = urlParams.get('genre');
  const animeIdFromURL = urlParams.get('id');

  /* ══════════════════════════════════════════════
     ENTER
  ══════════════════════════════════════════════ */
  document.getElementById('enter-btn').addEventListener('click', () => {
    const intro = document.getElementById('intro');
    const app = document.getElementById('app');
    // Play music
    const music = document.getElementById('bg-music');
    if (music) { music.volume = 0.12; music.play().catch(()=>{}); }

    intro.style.transition = 'opacity 0.5s, transform 0.5s';
    intro.style.opacity = '0';
    intro.style.transform = 'scale(0.97)';
    setTimeout(() => {
      intro.style.display = 'none';
      app.style.display = 'block';
      app.classList.add('fade-enter');
      loadApp();
    }, 500);
  });

  /* ══════════════════════════════════════════════
     LOAD APP
  ══════════════════════════════════════════════ */
  function loadApp() {
    loadNews();
    fetch('animes.json')
      .then(r => r.json())
      .then(data => {
        window.allAnimes = data; allAnimes = data;
        buildGenreChips();
        if (genreFromURL) {
          activeGenres.add(decodeURIComponent(genreFromURL));
          document.querySelectorAll('.genre-chip').forEach(c => {
            if (c.dataset.genre === decodeURIComponent(genreFromURL)) c.classList.add('active');
          });
        }
        if (animeIdFromURL) {
          const anime = allAnimes.find(a => a.id === animeIdFromURL);
          anime ? showDetail(anime) : renderAnimes(filterList());
        } else {
          renderAnimes(filterList());
        }
      })
      .catch(() => {
        document.getElementById('anime-directory').innerHTML =
          '<div class="empty-state"><p>Error cargando datos.</p></div>';
      });
  }

  /* ══════════════════════════════════════════════
     NEWS
  ══════════════════════════════════════════════ */
  let newsCards = 0;


  /* ── Traducciones AniList ES ── */
  function translateDesc(text) {
    if (!text) return 'Sin descripcion.';
    // AniList devuelve HTML tags en descripciones, limpiarlos
    return text.replace(/<[^>]*>/g, '').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#039;/g,"'").replace(/&quot;/g,'"');
  }
  function fmtDate(sd) {
    if (!sd || !sd.year) return '';
    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const m = sd.month ? meses[sd.month-1] : '';
    return [sd.day, m, sd.year].filter(Boolean).join(' ');
  }

  async function loadNews() {
    const track = document.getElementById('news-track');
    /* Pedir titulo en romaji, nativo y english + coverImage vertical (large) */
    const query = `query($p:Int,$pp:Int){Page(page:$p,perPage:$pp){media(sort:START_DATE_DESC,type:ANIME,status_in:[RELEASING,NOT_YET_RELEASED,FINISHED]){id title{romaji english native}coverImage{large extraLarge}genres startDate{year month day}description(asHtml:false)siteUrl}}}`;
    try {
      const res = await fetch('https://graphql.anilist.co', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables: { p: 1, pp: 9 } })
      });
      const data = await res.json();
      track.innerHTML = '';
      const items = data.data.Page.media;
      items.forEach((anime, idx) => {
        const card = document.createElement('div');
        card.className = 'news-card';

        const title = anime.title.english || anime.title.romaji;
        const desc  = translateDesc(anime.description || '').slice(0, idx === 0 ? 180 : 120);
        const date  = fmtDate(anime.startDate);
        const genre = (anime.genres || []).slice(0, 2).join(' · ') || 'Anime';
        const img   = anime.coverImage.extraLarge || anime.coverImage.large;

        card.innerHTML = `
          <a href="${anime.siteUrl}" target="_blank" rel="noopener">
            <div class="news-card-img">
              <img src="${img}" alt="${title}" loading="lazy" />
            </div>
            <div class="news-card-overlay">
              <div class="news-card-tag">Anime · ${genre}</div>
              <div class="news-card-title">${title}</div>
              <div class="news-card-desc">${desc}</div>
              <div class="news-card-meta">${date}</div>
            </div>
          </a>
        `;
        track.appendChild(card);
      });
      newsCards = track.children.length;
      setupInfinite();
    } catch {
      track.innerHTML = '<div style="padding:2rem;color:var(--muted)">No se pudieron cargar las noticias.</div>';
    }
  }

  /* ── NEWS SLIDER — cover overlay, infinito, snap preciso ── */
  const newsWrap  = document.querySelector('.news-track-wrap');
  const newsTrack = document.getElementById('news-track');
  let newsTotal = 0;
  let newsPos   = 0; // px actual del translateX (negativo = mover a izquierda)

  function getCardW() {
    const first = newsTrack.querySelector('.news-card');
    if (!first) return 260;
    return first.getBoundingClientRect().width + 16; // gap 1rem=16px
  }

  function setupInfinite() {
    const originals = Array.from(newsTrack.children);
    newsTotal = originals.length;
    if (newsTotal < 2) return;
    // Clonar todos al final y al principio para loop infinito
    originals.forEach(el => newsTrack.appendChild(el.cloneNode(true)));
    originals.slice().reverse().forEach(el =>
      newsTrack.insertBefore(el.cloneNode(true), newsTrack.firstChild)
    );
    // Arrancar en el primer item real (index = newsTotal en el DOM)
    newsPos = newsTotal * getCardW();
    newsTrack.style.transition = 'none';
    newsTrack.style.transform  = `translateX(-${newsPos}px)`;
  }

  function newsSet(px, animated) {
    newsTrack.style.transition = animated
      ? 'transform 0.42s cubic-bezier(.77,0,.18,1)' : 'none';
    newsTrack.style.transform = `translateX(-${px}px)`;
    newsPos = px;
  }

  function newsWrap_() {
    // Reposicionar si estamos en zona de clones
    const totalW = newsTotal * getCardW();
    if (newsPos >= totalW * 2) newsSet(newsPos - totalW, false);
    else if (newsPos < totalW)  newsSet(newsPos + totalW, false);
  }

  function newsStep(dir) {
    const cw = getCardW();
    newsSet(newsPos + dir * cw, true);
    setTimeout(newsWrap_, 450);
  }

  document.getElementById('news-prev').onclick = () => newsStep(-1);
  document.getElementById('news-next').onclick = () => newsStep(1);

  /* ── Mouse drag ── */
  let dragStart = null, dragBase = 0, dragDelta = 0, dragActive = false;
  let blockNextClick = false;

  newsWrap.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.preventDefault();
    dragStart  = e.clientX;
    dragBase   = newsPos; // posicion al empezar — clave para snap correcto
    dragDelta  = 0; dragActive = false;
    newsTrack.style.transition = 'none';
    newsWrap.classList.add('dragging');
  });

  window.addEventListener('mousemove', e => {
    if (dragStart === null) return;
    dragDelta = e.clientX - dragStart;
    if (Math.abs(dragDelta) > 8) {
      dragActive = true;
      newsTrack.style.transform = `translateX(-${dragBase - dragDelta}px)`;
    }
  });

  window.addEventListener('mouseup', () => {
    if (dragStart === null) return;
    newsWrap.classList.remove('dragging');
    const wasDrag = dragActive;
    dragStart = null; dragActive = false;

    if (wasDrag) {
      blockNextClick = true;
      const cw = getCardW();
      // Snap al card mas cercano desde la posicion de arrastre
      const rawPos = dragBase - dragDelta;
      const snapped = Math.round(rawPos / cw) * cw;
      newsSet(snapped, true);
      newsPos = snapped;
      setTimeout(newsWrap_, 450);
    }
    dragDelta = 0;
  });

  newsWrap.addEventListener('click', e => {
    if (blockNextClick) {
      e.preventDefault(); e.stopImmediatePropagation();
      blockNextClick = false;
    }
  }, true);

  /* ── Touch ── */
  let touchStartX = null, touchBase = 0, touchDelta = 0;

  newsWrap.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchBase   = newsPos;
    touchDelta  = 0;
    newsTrack.style.transition = 'none';
  }, { passive: true });

  newsWrap.addEventListener('touchmove', e => {
    if (touchStartX === null) return;
    touchDelta = e.touches[0].clientX - touchStartX;
    newsTrack.style.transform = `translateX(-${touchBase - touchDelta}px)`;
  }, { passive: true });

  newsWrap.addEventListener('touchend', () => {
    if (touchStartX === null) return;
    touchStartX = null;
    const cw = getCardW();
    const rawPos  = touchBase - touchDelta;
    const snapped = Math.round(rawPos / cw) * cw;
    newsSet(snapped, true);
    newsPos = snapped;
    setTimeout(newsWrap_, 450);
    touchDelta = 0;
  });

  /* ══════════════════════════════════════════════
     GENRES
  ══════════════════════════════════════════════ */
  function buildGenreChips() {
    const container = document.getElementById('genre-chips');
    const genres = Array.from(new Set(allAnimes.flatMap(a => a.genre))).sort();
    container.innerHTML = '';
    genres.forEach(g => {
      const chip = document.createElement('button');
      chip.className = 'genre-chip';
      chip.dataset.genre = g;
      chip.textContent = g;
      chip.addEventListener('click', () => {
        chip.classList.toggle('active');
        activeGenres.has(g) ? activeGenres.delete(g) : activeGenres.add(g);
        renderAnimes(filterList());
      });
      container.appendChild(chip);
    });
  }

  function filterList() {
    const term = document.getElementById('search-input').value.toLowerCase();
    return allAnimes.filter(a =>
      a.name.toLowerCase().includes(term) &&
      (activeGenres.size === 0 || [...activeGenres].some(g => a.genre.includes(g)))
    );
  }

  document.getElementById('search-input').addEventListener('input', () => renderAnimes(filterList()));

  /* ══════════════════════════════════════════════
     RENDER
  ══════════════════════════════════════════════ */
  function renderAnimes(list) {
    const dir = document.getElementById('anime-directory');
    document.getElementById('anime-count').textContent = `${list.length} títulos`;
    dir.innerHTML = '';
    if (!list.length) {
      dir.innerHTML = '<div class="empty-state"><p>Sin resultados para tu búsqueda.</p></div>';
      return;
    }
    list.forEach(a => {
      const card = document.createElement('div');
      card.className = 'anime-card';
      card.innerHTML = `
        <img src="${a.cover}" alt="${a.name}" loading="lazy" />
        <div class="anime-card-overlay">
          <div class="anime-card-title">${a.name}</div>
          <div class="anime-card-genre">${(a.genre||[]).slice(0,2).join(' · ')}</div>
        </div>
      `;
      card.addEventListener('click', () => {
        window.location.href = `anime.html?id=${encodeURIComponent(a.id)}`;
      });
      dir.appendChild(card);
    });
  }

  /* ══════════════════════════════════════════════
     DETAIL
  ══════════════════════════════════════════════ */
  function showDetail(anime) {
    document.getElementById('anime-directory').style.display = 'none';
    document.getElementById('anime-details').style.display = 'block';
    document.querySelector('.filter-bar').style.display = 'none';
    document.querySelector('.section-header').style.display = 'none';

    document.getElementById('detail-cover-img').src = anime.cover || '';
    document.getElementById('detail-name').textContent = anime.name;
    document.getElementById('detail-description').textContent = anime.description || 'Sin descripción.';

    const genreWrap = document.getElementById('detail-genres');
    genreWrap.innerHTML = (anime.genre||[]).map(g =>
      `<span class="detail-genre-tag">${g}</span>`
    ).join('');

    const epList = document.getElementById('episode-list');
    const vidPlayer = document.getElementById('video-player');
    epList.innerHTML = ''; vidPlayer.innerHTML = '';

    if (anime.episodes?.length) {
      anime.episodes.forEach((ep, i) => {
        const btn = document.createElement('button');
        btn.textContent = `${ep.number}. ${ep.title}`;
        btn.addEventListener('click', () => {
          epList.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const tmp = document.createElement('div'); tmp.innerHTML = ep.embed;
          const iframe = tmp.querySelector('iframe');
          vidPlayer.innerHTML = '';
          const wrap = document.createElement('div'); wrap.className = 'video-container';
          if (iframe) {
            iframe.removeAttribute('width'); iframe.removeAttribute('height');
            wrap.appendChild(iframe);
          } else { wrap.innerHTML = ep.embed; }
          vidPlayer.appendChild(wrap);
        });
        epList.appendChild(btn);
        if (i === 0) btn.click();
      });
    } else {
      epList.innerHTML = '<span style="color:var(--muted);font-size:0.85rem">Sin episodios disponibles.</span>';
    }
  }

  document.getElementById('detail-back-btn').addEventListener('click', () => {
    document.getElementById('anime-details').style.display = 'none';
    document.getElementById('anime-directory').style.display = 'grid';
    document.querySelector('.filter-bar').style.display = 'flex';
    document.querySelector('.section-header').style.display = 'flex';
  });

  /* ── MASCOT — loaded from ram-assistent.js ── */
  /* ══════════════════════════════════════════════
     IF URL HAS PARAMS, SKIP INTRO
  ══════════════════════════════════════════════ */
  if (genreFromURL || animeIdFromURL) {
    document.getElementById('intro').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadApp();
  }
  </script>
  <script src="ram-assistent.js"></script>
</body>
