<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Re:Anime · Gacha</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;700&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #080808;
      --bg2:      #111;
      --bg3:      #1a1a1a;
      --surface:  #161616;
      --border:   #222;
      --pink:     #ff2d78;
      --pink-dim: #ff2d7822;
      --pink-glow:#ff2d7855;
      --rose:     #ff6fa8;
      --text:     #e8e8e8;
      --muted:    #555;
      --gold:     #fbbf24;
      --silver:   #94a3b8;
      --bronze:   #c97f4a;
      --r5:       #fbbf24;
      --r4:       #c084fc;
      --r3:       #38bdf8;
      --r2:       #86efac;
      --r1:       #94a3b8;
      --font-h:   'Bebas Neue', cursive;
      --font-b:   'DM Sans', sans-serif;
      --font-jp:  'Noto Sans JP', sans-serif;
      --radius:   10px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:var(--pink); border-radius:2px; }

    body {
      font-family: var(--font-b);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise texture */
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size:200px 200px; opacity:0.4; transform:translateZ(0);
    }

    /* ── HEADER ── */
    header {
      position:fixed; top:0; left:0; right:0; z-index:900;
      height:56px; display:flex; align-items:center; justify-content:space-between;
      padding:0 2rem;
      background:rgba(8,8,8,0.95); backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
    }
    .logo {
      font-family:var(--font-h); font-size:2rem; letter-spacing:3px;
      color:var(--pink); text-decoration:none;
      text-shadow:0 0 20px var(--pink-glow);
    }
    .logo span { color:var(--text); }
    .back-header {
      background:none; border:1px solid var(--border); color:var(--muted);
      border-radius:6px; padding:0.4rem 0.9rem; font-size:0.82rem;
      cursor:pointer; font-family:var(--font-b); transition:all 0.2s;
    }
    .back-header:hover { border-color:var(--pink); color:var(--pink); }

    /* ── MAIN ── */
    .page {
      max-width:1100px; margin:0 auto; padding:80px 2rem 4rem;
      position:relative; z-index:1;
    }

    /* Page title */
    .gacha-title {
      font-family:var(--font-h); font-size:clamp(2.5rem,6vw,4.5rem);
      letter-spacing:6px; text-align:center; margin-bottom:0.3rem;
      background: linear-gradient(135deg, #fff 30%, var(--pink) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .gacha-sub {
      text-align:center; color:var(--muted); font-size:0.82rem;
      letter-spacing:3px; text-transform:uppercase;
      margin-bottom:2.5rem;
    }

    /* ── BANNER TABS ── */
    .banner-tabs {
      display:flex; gap:0.75rem; justify-content:center;
      margin-bottom:2rem; flex-wrap:wrap;
    }
    .banner-tab {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:0.7rem 1.6rem;
      cursor:pointer; font-family:var(--font-b); font-size:0.85rem;
      color:var(--muted); transition:all 0.25s; text-align:center;
    }
    .banner-tab .tab-name { font-family:var(--font-h); font-size:1.1rem; letter-spacing:2px; display:block; }
    .banner-tab .tab-sub  { font-size:0.68rem; letter-spacing:1px; margin-top:0.1rem; opacity:0.6; }
    .banner-tab:hover { border-color:var(--rose); color:var(--text); }
    .banner-tab.active { border-color:var(--pink); color:var(--text); background:var(--pink-dim); }
    .banner-tab.active .tab-name { color:var(--pink); }

    /* ── BANNER DISPLAY ── */
    .banner-area {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:2rem;
      margin-bottom:1.5rem; position:relative; overflow:hidden;
    }
    .banner-bg {
      position:absolute; inset:0; opacity:0.04;
      background:radial-gradient(ellipse 80% 60% at 50% 100%, var(--pink) 0%, transparent 70%);
      pointer-events:none;
    }
    .banner-info {
      position:relative; z-index:1;
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:1rem;
    }
    .banner-name {
      font-family:var(--font-h); font-size:2rem; letter-spacing:3px; color:var(--text);
    }
    .banner-name em { color:var(--pink); font-style:normal; }
    .banner-desc { color:var(--muted); font-size:0.82rem; margin-top:0.2rem; max-width:480px; }

    /* Pull buttons */
    .pull-btns { display:flex; gap:0.75rem; flex-wrap:wrap; }
    .pull-btn {
      background:var(--pink); border:none; color:#fff;
      border-radius:var(--radius); padding:0.75rem 1.8rem;
      font-family:var(--font-h); font-size:1.2rem; letter-spacing:2px;
      cursor:pointer; transition:all 0.2s;
      box-shadow:0 0 20px var(--pink-glow);
      display:flex; flex-direction:column; align-items:center; gap:0.1rem;
    }
    .pull-btn:hover { opacity:0.85; transform:translateY(-2px); }
    .pull-btn:active { transform:translateY(0); }
    .pull-btn.x10 { background:linear-gradient(135deg, #c026d3, var(--pink)); }
    .pull-btn .btn-label { font-size:0.65rem; letter-spacing:2px; opacity:0.8; font-family:var(--font-b); }
    .pull-btn.disabled { opacity:0.35; pointer-events:none; }

    /* ── RESULT AREA ── */
    #result-area {
      min-height:320px; position:relative;
    }

    /* Card grid */
    .cards-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
      gap:1rem;
      animation:fadeUp 0.4s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Character card */
    .char-card {
      position:relative; border-radius:var(--radius);
      overflow:hidden; aspect-ratio:2/3;
      border:2px solid var(--border);
      cursor:pointer; background:var(--bg3);
      transition:transform 0.3s, border-color 0.3s;
    }
    .char-card:hover { transform:translateY(-4px) scale(1.03); }

    /* ── RARITY ANIMATIONS ── */

    /* 1★ 2★ — fade simple */
    @keyframes anim1 {
      0%   { opacity:0; transform:translateY(30px) scale(0.9); }
      100% { opacity:1; transform:translateY(0) scale(1); }
    }

    /* 3★ — slide desde la izquierda con giro leve */
    @keyframes anim3 {
      0%   { opacity:0; transform:translateX(-60px) rotate(-6deg) scale(0.85); }
      60%  { transform:translateX(8px) rotate(1deg) scale(1.03); }
      100% { opacity:1; transform:translateX(0) rotate(0) scale(1); }
    }

    /* 4★ — caida desde arriba + rebote */
    @keyframes anim4 {
      0%   { opacity:0; transform:translateY(-120px) scale(0.7); }
      55%  { opacity:1; transform:translateY(18px) scale(1.06); }
      75%  { transform:translateY(-8px) scale(0.98); }
      90%  { transform:translateY(5px) scale(1.01); }
      100% { transform:translateY(0) scale(1); }
    }

    /* 5★ — zoom desde el fondo + latido */
    @keyframes anim5 {
      0%   { opacity:0; transform:scale(0.1) rotate(-15deg); filter:brightness(5) saturate(0); }
      35%  { opacity:1; transform:scale(1.2) rotate(3deg); filter:brightness(2.5) saturate(2); }
      55%  { transform:scale(0.96) rotate(-1deg); filter:brightness(1.5); }
      70%  { transform:scale(1.06) rotate(0.5deg); }
      85%  { transform:scale(0.99); filter:brightness(1); }
      100% { transform:scale(1) rotate(0deg); filter:brightness(1); }
    }

    /* Flash de fondo por rareza — se muestra en el fullscreen overlay */
    @keyframes bgFlash5 {
      0%   { background:rgba(251,191,36,0); }
      20%  { background:rgba(251,191,36,0.25); }
      100% { background:rgba(0,0,0,0.92); }
    }
    @keyframes bgFlash4 {
      0%   { background:rgba(192,132,252,0); }
      20%  { background:rgba(192,132,252,0.2); }
      100% { background:rgba(0,0,0,0.92); }
    }

    /* Rays para 5★ */
    @keyframes rays {
      0%   { opacity:0; transform:scale(0.5) rotate(0deg); }
      30%  { opacity:0.7; }
      100% { opacity:0; transform:scale(2.5) rotate(45deg); }
    }

    /* Shake para 4★ */
    @keyframes shake4 {
      0%,100% { transform:translateX(0); }
      15%  { transform:translateX(-8px) rotate(-2deg); }
      30%  { transform:translateX(8px) rotate(2deg); }
      45%  { transform:translateX(-5px) rotate(-1deg); }
      60%  { transform:translateX(5px) rotate(1deg); }
      75%  { transform:translateX(-2px); }
    }

        /* ── SINGLE REVEAL (resultado final en gacha) ── */
    .single-reveal {
      display:flex; justify-content:center;
    }
    .single-reveal .char-card {
      width:260px; max-width:90vw; aspect-ratio:2/3;
    }
    .cards-grid .char-card {
      animation:anim1 0.4s ease both;
    }

    /* ── CARD BACK ── */
    .card-back {
      border:2px solid #1a1a3a;
      background:linear-gradient(135deg,#0d0d1a,#16213e) !important;
      transition:none;
    }

    /* ── CARD BACK ── */
    .card-back-ph {
      border:2px dashed #1a1a3a;
      background:#090912 !important;
      border-radius:var(--radius); aspect-ratio:2/3;
      display:flex; align-items:center; justify-content:center;
      color:#1a1a3a; font-size:2rem;
    }

    /* ── FULLSCREEN REVEAL OVERLAY ── */
    #reveal-overlay {
      position:fixed; inset:0; z-index:5000;
      background:rgba(0,0,0,0.92);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:1.5rem;
      opacity:0; pointer-events:none;
      transition:opacity 0.3s;
    }
    #reveal-overlay.open { opacity:1; pointer-events:auto; }

    /* Rays de fondo para 5★ */
    #reveal-rays {
      position:absolute; inset:0; pointer-events:none;
      background:conic-gradient(
        from 0deg,
        transparent 0deg, rgba(251,191,36,0.12) 10deg,
        transparent 20deg, rgba(251,191,36,0.08) 30deg,
        transparent 40deg
      );
      opacity:0;
    }

    /* La carta grande en el center */
    #reveal-card-wrap {
      position:relative; z-index:2;
      display:flex; align-items:center; justify-content:center;
    }
    #reveal-card-wrap .char-card {
      width:min(300px, 70vw);
      aspect-ratio:2/3;
      cursor:default;
    }

    /* Nombre grande bajo la carta */
    #reveal-charname {
      font-family:var(--font-h); font-size:clamp(1.6rem,4vw,2.8rem);
      letter-spacing:4px; text-align:center; z-index:2;
      text-shadow:0 2px 20px rgba(0,0,0,0.8);
    }
    #reveal-charanime {
      font-size:0.85rem; color:var(--muted);
      letter-spacing:2px; text-align:center; z-index:2;
    }

    /* Contador y tip */
    #reveal-counter {
      font-size:0.72rem; color:var(--muted);
      letter-spacing:2px; text-transform:uppercase; z-index:2;
    }
    #reveal-skip {
      background:none; border:1px solid var(--border);
      color:var(--muted); border-radius:6px;
      padding:0.4rem 1.2rem; font-size:0.78rem;
      cursor:pointer; font-family:var(--font-b);
      transition:all 0.2s; z-index:2;
    }
    #reveal-skip:hover { border-color:var(--pink); color:var(--pink); }

    /* ── LOADING SPINNER ── */
    .pull-loading {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:1rem; min-height:280px; color:var(--muted);
    }
    .spinner {
      width:48px; height:48px;
      border:3px solid var(--border);
      border-top-color:var(--pink);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── EMPTY / INACTIVE BANNER ── */
    .banner-inactive {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; min-height:280px; gap:1rem;
      color:var(--muted); text-align:center;
    }
    .banner-inactive .bi-icon { font-size:3rem; opacity:0.3; }
    .banner-inactive p { font-size:0.88rem; max-width:320px; line-height:1.6; }

    /* ── DETAIL MODAL ── */
    #modal {
      position:fixed; inset:0; z-index:2000;
      background:rgba(0,0,0,0.85); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
      padding:1rem;
      opacity:0; pointer-events:none;
      transition:opacity 0.25s;
    }
    #modal.open { opacity:1; pointer-events:auto; }
    .modal-box {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius); overflow:hidden;
      max-width:420px; width:100%;
      display:flex; flex-direction:column;
      animation:modalIn 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes modalIn {
      from { opacity:0; transform:scale(0.85); }
      to   { opacity:1; transform:scale(1); }
    }
    .modal-img {
      width:100%; height:280px; object-fit:cover; object-position:top;
      display:block;
    }
    .modal-body { padding:1.4rem; }
    .modal-stars { font-size:1rem; margin-bottom:0.4rem; }
    .modal-name {
      font-family:var(--font-h); font-size:2rem; letter-spacing:2px;
      color:var(--text); margin-bottom:0.2rem; line-height:1;
    }
    .modal-anime { color:var(--pink); font-size:0.82rem; margin-bottom:0.8rem; }
    .modal-desc { color:var(--muted); font-size:0.83rem; line-height:1.65; }
    .modal-close {
      margin-top:1.2rem; width:100%; background:none;
      border:1px solid var(--border); color:var(--muted);
      border-radius:6px; padding:0.55rem;
      cursor:pointer; font-family:var(--font-b); transition:all 0.2s;
    }
    .modal-close:hover { border-color:var(--pink); color:var(--pink); }

    /* ── HISTORY ── */
    .history-title {
      font-family:var(--font-h); font-size:1.3rem; letter-spacing:2px;
      color:var(--text); margin:2rem 0 0.8rem;
    }
    .history-title em { color:var(--pink); font-style:normal; }
    .history-grid {
      display:flex; gap:0.5rem; overflow-x:auto; padding-bottom:0.5rem;
    }
    .history-grid::-webkit-scrollbar { height:2px; }
    .history-chip {
      flex-shrink:0; border-radius:6px; overflow:hidden;
      width:48px; height:64px; border:1px solid var(--border);
      cursor:pointer; transition:transform 0.2s;
    }
    .history-chip:hover { transform:scale(1.1); }
    .history-chip img { width:100%; height:100%; object-fit:cover; object-position:top; display:block; }

    /* ── RESPONSIVE ── */
    @media (max-width:600px) {
      .pull-btns { justify-content:center; }
      .banner-info { flex-direction:column; align-items:flex-start; }
      .cards-grid { grid-template-columns:repeat(auto-fill, minmax(130px,1fr)); }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="index.html">Re<em style="color:var(--text)">:</em>Anime</a>
    <button class="back-header" onclick="history.length>1?history.back():location.href='index.html'">← Volver</button>
  </header>

  <div class="page">
    <div class="gacha-title">GACHA</div>
    <div class="gacha-sub">アニメ · Invocaciones · Re:Anime</div>

    <!-- BANNER TABS -->
    <div class="banner-tabs" id="banner-tabs"></div>

    <!-- ACTIVE BANNER DISPLAY -->
    <div class="banner-area" id="banner-area">
      <div class="banner-bg"></div>
      <div class="banner-info">
        <div>
          <div class="banner-name" id="banner-name">Banner <em>Común</em></div>
          <div class="banner-desc" id="banner-desc">Personajes aleatorios de anime y manga de todas las series.</div>
        </div>
        <div class="pull-btns">
          <button class="pull-btn" id="btn-x1" onclick="doPull(1)">
            <span>×1 INVOCAR</span>
            <span class="btn-label">GIRO INFINITO (TEST)</span>
          </button>
          <button class="pull-btn x10" id="btn-x10" onclick="doPull(10)">
            <span>×10 INVOCAR</span>
            <span class="btn-label">GIRO INFINITO (TEST)</span>
          </button>
        </div>
      </div>
    </div>

    <!-- RESULT AREA -->
    <div id="result-area"></div>

    <!-- HISTORY -->
    <div class="history-title"><em>Recientes</em></div>
    <div class="history-grid" id="history-grid"></div>
  </div>

  <!-- FULLSCREEN REVEAL OVERLAY -->
  <div id="reveal-overlay">
    <div id="reveal-rays"></div>
    <div id="reveal-card-wrap"></div>
    <div id="reveal-charname"></div>
    <div id="reveal-charanime"></div>
    <div id="reveal-counter"></div>
    <button id="reveal-skip" onclick="revealSkip()">Saltar todo</button>
  </div>

  <!-- DETAIL MODAL -->
  <div id="modal" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <img id="modal-img" src="" alt="" class="modal-img" />
      <div class="modal-body">
        <div class="modal-stars" id="modal-stars"></div>
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-anime" id="modal-anime"></div>
        <div class="modal-desc" id="modal-desc"></div>
        <button class="modal-close" onclick="closeModal()">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
  /* ══════════════════════════════════════
     CONFIG
  ══════════════════════════════════════ */
  const BANNERS = [
    {
      id:       'common',
      name:     'Banner',
      nameEm:   'Común',
      desc:     'Personajes aleatorios de anime y manga. Cualquier personaje puede aparecer.',
      color:    '#ff2d78',
      active:   true,
      type:     'jikan', // usa Jikan API
    }
  ];

  let activeBanner = BANNERS[0];
  let customBanners = [];
  let pullHistory   = JSON.parse(localStorage.getItem('gacha_history') || '[]');
  let pulling       = false;

  /* ── Rarity weights para banner común ── */
  const RARITY_WEIGHTS = [
    { stars: 5, weight: 0.6 },  // 0.6%
    { stars: 4, weight: 5.1 },  // 5.1%
    { stars: 3, weight: 16  },  // 16%
    { stars: 2, weight: 38  },  // 38%
    { stars: 1, weight: 40.3},  // 40.3%
  ];

  function rollRarity() {
    const total = RARITY_WEIGHTS.reduce((s,r)=>s+r.weight,0);
    let r = Math.random() * total;
    for (const rw of RARITY_WEIGHTS) {
      r -= rw.weight;
      if (r <= 0) return rw.stars;
    }
    return 1;
  }

  function starsHTML(n, cls) {
    return `<span class="${cls}">${'★'.repeat(n)}${'☆'.repeat(5-n)}</span>`;
  }

  /* ══════════════════════════════════════
     JIKAN API — pool de personajes
     Estrategia: 1 sola request para llenar
     un pool local, pulls se sirven del pool.
     Cuando queda poco, refrescar en segundo plano.
  ══════════════════════════════════════ */
  let charPool   = [];   // personajes ya cargados
  let poolLoading = false;

  function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

  /* Convierte un objeto data de Jikan a nuestro formato */
  function jikanToChar(d) {
    const anime = d.anime?.[0]?.anime?.title
               || d.manga?.[0]?.manga?.title
               || 'Anime/Manga';
    return {
      id:          d.mal_id,
      name:        d.name,
      anime,
      image:       d.images?.jpg?.image_url || d.images?.webp?.image_url || '',
      description: (d.about || 'Sin informacion adicional.').slice(0, 280).replace(/\n/g,' '),
      stars:       rollRarity(),
      source:      'jikan',
    };
  }

  /* Carga una pagina de personajes top — 1 request, 25 personajes */
  async function fillPool() {
    if (poolLoading) return;
    poolLoading = true;
    /* paginas 1-20 al azar para variedad */
    const page = Math.ceil(Math.random() * 20);
    try {
      const r = await fetch(`https://api.jikan.moe/v4/top/characters?page=${page}&limit=25`);
      if (!r.ok) throw new Error('Jikan ' + r.status);
      const j = await r.json();
      const nuevos = (j.data || []).map(jikanToChar);
      /* Mezclar aleatoriamente y agregar al pool */
      for (let i = nuevos.length - 1; i > 0; i--) {
        const k = Math.floor(Math.random() * (i+1));
        [nuevos[i], nuevos[k]] = [nuevos[k], nuevos[i]];
      }
      charPool = [...charPool, ...nuevos];
    } catch(e) {
      console.warn('Jikan pool fill failed:', e);
      /* Llenar con fallbacks para no dejar el pool vacío */
      for (let i=0; i<10; i++) charPool.push(fallbackChar(rollRarity()));
    }
    poolLoading = false;
  }

  /* Sacar n personajes del pool; si hay pocos, rellenar en background */
  async function fetchMultipleJikan(n) {
    /* Si el pool tiene menos de lo necesario, esperar carga */
    if (charPool.length < n) {
      await fillPool();
    }
    /* Si aun falta (fillPool fallo), completar con fallbacks */
    while (charPool.length < n) charPool.push(fallbackChar(rollRarity()));

    const pulled = charPool.splice(0, n);

    /* Rellenar en background cuando queda poco */
    if (charPool.length < 15) fillPool();

    /* Re-asignar raridad en el momento del pull (el pool guarda stars fijas,
       pero queremos variedad en cada sesion) */
    return pulled.map(c => ({ ...c, stars: rollRarity() }));
  }

  function fallbackChar(stars) {
    const names  = ['Yuki','Hana','Rei','Sakura','Akira','Natsuki','Sora','Kira','Miku','Aoi'];
    const animes = ['Re:Zero','Sword Art Online','Attack on Titan','Naruto','One Piece','Demon Slayer','Jujutsu Kaisen','My Hero Academia'];
    return {
      id:          Math.random(),
      name:        names[Math.floor(Math.random()*names.length)],
      anime:       animes[Math.floor(Math.random()*animes.length)],
      image:       '',
      description: 'Personaje de anime.',
      stars,
      source:      'fallback',
    };
  }

  /* ══════════════════════════════════════
     CUSTOM BANNER (gacha.json)
  ══════════════════════════════════════ */
  async function loadCustomBanners() {
    try {
      const r = await fetch('gacha.json');
      const j = await r.json();
      customBanners = (j.banners || []).filter(b => b.active && b.characters?.length);
      customBanners.forEach(b => {
        BANNERS.push({
          id:     b.id,
          name:   'Banner',
          nameEm: b.name,
          desc:   b.subtitle || 'Banner especial.',
          color:  b.color || '#c084fc',
          active: true,
          type:   'custom',
          chars:  b.characters,
        });
      });
      buildTabs();
    } catch { /* gacha.json ausente o invalido — solo banner común */ }
  }

  function pullCustom(banner, n) {
    const pool = banner.chars;
    const results = [];
    for (let i=0; i<n; i++) {
      const char = pool[Math.floor(Math.random()*pool.length)];
      results.push({ ...char, stars: char.rarity || rollRarity() });
    }
    return results;
  }

  /* ══════════════════════════════════════
     PULL LOGIC
  ══════════════════════════════════════ */
  async function doPull(n) {
    if (pulling) return;
    pulling = true;
    setBtnsDisabled(true);

    // Mostrar loading
    document.getElementById('result-area').innerHTML = `
      <div class="pull-loading">
        <div class="spinner"></div>
        <span>Invocando${n>1?' ×'+n:''}...</span>
      </div>`;

    let chars = [];
    try {
      if (activeBanner.type === 'jikan') {
        chars = await fetchMultipleJikan(n);
      } else if (activeBanner.type === 'custom') {
        chars = pullCustom(activeBanner, n);
        await delay(400); // animacion de espera
      }
    } catch {
      chars = Array.from({length:n}, ()=>fallbackChar(rollRarity()));
    }

    // Guardar en historial
    pullHistory = [...chars, ...pullHistory].slice(0, 50);
    localStorage.setItem('gacha_history', JSON.stringify(pullHistory));

    // Mostrar resultados
    await showResults(chars, n);
    updateHistory();
    pulling = false;
    setBtnsDisabled(false);
  }

  function setBtnsDisabled(v) {
    document.getElementById('btn-x1').classList.toggle('disabled', v);
    document.getElementById('btn-x10').classList.toggle('disabled', v);
  }

  /* ══════════════════════════════════════
     RENDER RESULTS — fullscreen reveal 1x1
  ══════════════════════════════════════ */

  /* Configuracion de animacion + colores por rareza */
  const R_CFG = {
    5: { anim:'anim5',  dur:1100, nameColor:'#fbbf24', bgAnim:'bgFlash5', rays:true,  shake:false },
    4: { anim:'anim4',  dur:800,  nameColor:'#c084fc', bgAnim:'bgFlash4', rays:false, shake:true  },
    3: { anim:'anim3',  dur:600,  nameColor:'#38bdf8', bgAnim:null,       rays:false, shake:false },
    2: { anim:'anim1',  dur:450,  nameColor:'#86efac', bgAnim:null,       rays:false, shake:false },
    1: { anim:'anim1',  dur:350,  nameColor:'#94a3b8', bgAnim:null,       rays:false, shake:false },
  };

  let revealQueue   = [];
  let revealIndex   = 0;
  let revealChars   = [];
  let revealSkipped = false;
  let revealResolve = null; // Promise resolver para el flujo principal

  const overlay     = document.getElementById('reveal-overlay');
  const revCardWrap = document.getElementById('reveal-card-wrap');
  const revName     = document.getElementById('reveal-charname');
  const revAnime    = document.getElementById('reveal-charanime');
  const revCounter  = document.getElementById('reveal-counter');
  const revRays     = document.getElementById('reveal-rays');

  function revealSkip() {
    revealSkipped = true;
    finishReveal();
  }

  function finishReveal() {
    overlay.classList.remove('open');
    revRays.style.animation = 'none';
    overlay.style.animation = 'none';
    if (revealResolve) { revealResolve(); revealResolve = null; }
  }

  /* Construir el elemento .char-card (sin animacion — la animacion se aplica en overlay) */
  function buildCardEl(ch, clickIdx, chars) {
    const rClass = `r${ch.stars}`;
    const el = document.createElement('div');
    el.className = `char-card ${rClass}`;
    el.innerHTML = ch.image
      ? `<img src="${ch.image}" alt="${ch.name}" loading="lazy" />`
      : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--muted);">✦</div>`;
    el.innerHTML += `
      <div class="char-overlay">
        <div class="char-stars">${starsHTML(ch.stars,'stars-'+rClass)}</div>
        <div class="char-name">${ch.name}</div>
        <div class="char-anime">${ch.anime}</div>
      </div>`;
    el.addEventListener('click', ()=>openModal(chars[clickIdx]));
    return el;
  }

  /* Mostrar una carta en el overlay fullscreen */
  async function revealOne(ch, idx, total) {
    if (revealSkipped) return;

    const cfg = R_CFG[ch.stars] || R_CFG[1];

    /* Fondo flash por rareza */
    if (cfg.bgAnim) {
      overlay.style.animation = `${cfg.bgAnim} 0.8s ease forwards`;
    } else {
      overlay.style.animation = 'none';
      overlay.style.background = 'rgba(0,0,0,0.92)';
    }

    /* Rays para 5★ */
    revRays.style.opacity = cfg.rays ? '1' : '0';
    if (cfg.rays) {
      revRays.style.animation = 'rays 1s ease-out forwards';
    }

    /* Carta en el centro */
    revCardWrap.innerHTML = '';
    const cardEl = buildCardEl(ch, idx, revealChars);
    cardEl.style.cssText = `animation:${cfg.anim} ${cfg.dur}ms cubic-bezier(.34,1.56,.64,1) both;`;

    /* Shake wrapper para 4★ */
    if (cfg.shake) {
      const shaker = document.createElement('div');
      shaker.style.cssText = `animation:shake4 0.5s ease ${cfg.dur*0.4}ms both;`;
      shaker.appendChild(cardEl);
      revCardWrap.appendChild(shaker);
    } else {
      revCardWrap.appendChild(cardEl);
    }

    /* Nombre y anime */
    revName.textContent  = ch.name;
    revName.style.color  = cfg.nameColor;
    revName.style.animation = `anim1 0.4s ease ${cfg.dur*0.6}ms both`;
    revAnime.textContent = ch.anime;
    revAnime.style.animation = `anim1 0.4s ease ${cfg.dur*0.7}ms both`;
    revCounter.textContent = `${idx+1} / ${total}`;

    /* Esperar duracion de la animacion + tiempo para apreciar la carta */
    const viewTime = cfg.rays ? 1400 : cfg.shake ? 1100 : ch.stars >= 3 ? 900 : 650;
    await delay(cfg.dur + viewTime);
  }

  /* Flujo principal de revelacion fullscreen */
  async function runReveal(chars) {
    revealChars   = chars;
    revealSkipped = false;

    overlay.classList.add('open');

    for (let i=0; i<chars.length; i++) {
      if (revealSkipped) break;
      await revealOne(chars[i], i, chars.length);
    }

    /* Cerrar overlay y mostrar grilla resumen */
    return new Promise(res => {
      revealResolve = res;
      finishReveal();
    });
  }

  /* showResults — para x1 directo, para x10 fullscreen luego grilla */
  async function showResults(chars, n) {
    const area = document.getElementById('result-area');
    area.innerHTML = '';

    if (n === 1) {
      /* Single: reveal fullscreen y luego mostrar en pantalla */
      await revealOne(chars[0], 0, 1);
      finishReveal();

      const wrap = document.createElement('div');
      wrap.className = 'single-reveal';
      const el = buildCardEl(chars[0], 0, chars);
      wrap.appendChild(el);
      area.appendChild(wrap);

    } else {
      /* x10: reveal fullscreen 1x1, luego grilla resumen */
      await runReveal(chars);

      /* Mostrar grilla con todas las cartas */
      const grid = document.createElement('div');
      grid.className = 'cards-grid';

      /* Titulo resumen */
      const title = document.createElement('div');
      title.style.cssText = 'grid-column:1/-1;font-family:var(--font-h);font-size:1.1rem;letter-spacing:2px;color:var(--muted);padding-bottom:0.3rem;';
      title.textContent = `RESUMEN — ${chars.length} CARTAS`;
      grid.appendChild(title);

      chars.forEach((ch, i) => {
        const el = buildCardEl(ch, i, chars);
        /* Entrada escalonada rapida para el resumen */
        el.style.animation = `anim1 0.3s ease ${i*0.05}s both`;
        grid.appendChild(el);
      });

      area.appendChild(grid);
    }
  }

  /* ══════════════════════════════════════
     MODAL
  ══════════════════════════════════════ */
  function openModal(c) {
    const rClass = 'stars-r'+c.stars;
    document.getElementById('modal-img').src   = c.image || '';
    document.getElementById('modal-img').style.display = c.image ? 'block' : 'none';
    document.getElementById('modal-stars').innerHTML   = starsHTML(c.stars, rClass);
    document.getElementById('modal-name').textContent  = c.name;
    document.getElementById('modal-anime').textContent = c.anime;
    document.getElementById('modal-desc').textContent  = c.description || '';
    document.getElementById('modal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

  /* ══════════════════════════════════════
     HISTORY
  ══════════════════════════════════════ */
  function updateHistory() {
    const grid = document.getElementById('history-grid');
    grid.innerHTML = pullHistory.slice(0,30).map(c=>`
      <div class="history-chip r${c.stars}" title="${c.name}" onclick='openModal(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
        ${c.image
          ? `<img src="${c.image}" alt="${c.name}" loading="lazy"/>`
          : `<div style="width:100%;height:100%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--muted)">✦</div>`
        }
      </div>`).join('');
  }

  /* ══════════════════════════════════════
     TABS
  ══════════════════════════════════════ */
  function buildTabs() {
    const tabsEl = document.getElementById('banner-tabs');
    tabsEl.innerHTML = BANNERS.map(b=>`
      <div class="banner-tab ${b.id===activeBanner.id?'active':''}" onclick="switchBanner('${b.id}')">
        <span class="tab-name" style="color:${b.id===activeBanner.id?b.color:''}">${b.nameEm}</span>
        <span class="tab-sub">${b.desc.slice(0,30)}${b.desc.length>30?'…':''}</span>
      </div>`).join('');
  }

  function switchBanner(id) {
    activeBanner = BANNERS.find(b=>b.id===id) || BANNERS[0];
    buildTabs();

    document.getElementById('banner-name').innerHTML = `${activeBanner.name} <em style="color:${activeBanner.color}">${activeBanner.nameEm}</em>`;
    document.getElementById('banner-desc').textContent = activeBanner.desc;
    document.getElementById('result-area').innerHTML = '';

    if (activeBanner.type === 'custom' && !activeBanner.chars?.length) {
      document.getElementById('result-area').innerHTML = `
        <div class="banner-inactive">
          <div class="bi-icon">🎴</div>
          <p>Este banner no tiene personajes configurados todavia. Edita <b>gacha.json</b> para agregar personajes.</p>
        </div>`;
      setBtnsDisabled(true);
    } else {
      setBtnsDisabled(false);
    }
  }

  /* ══════════════════════════════════════
     INIT
  ══════════════════════════════════════ */
  buildTabs();
  updateHistory();
  loadCustomBanners();
  /* Pre-cargar pool en cuanto abre la pagina */
  fillPool();
  </script>
</body>
</html>
