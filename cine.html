<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Re:Anime · Modo Cine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink:  #ff2d78;
      --rose:  #ff6fa8;
      --bg:    #000;
      --text:  #e8e8e8;
      --muted: #555;
      --font-h:'Bebas Neue', cursive;
      --font-b:'DM Sans', sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: var(--font-b); color: var(--text); }

    /* ── VIDEO — ocupa todo, NUNCA bloqueado ── */
    #video-wrap { position: fixed; inset: 0; z-index: 0; }
    #video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── TOP BAR — unica zona de controles ── */
    /* pointer-events: none en el contenedor,
       auto solo en la barra misma */
    #ui {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      pointer-events: none; /* no bloquea clicks al video debajo */
    }

    #top-bar {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.8rem 1.4rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
      pointer-events: auto; /* solo la barra captura clicks */
      flex-wrap: wrap;
      opacity: 0; transition: opacity 0.3s;
    }
    body.active #top-bar { opacity: 1; }

    .cine-title {
      font-family: var(--font-h); font-size: 1.3rem;
      letter-spacing: 2px; white-space: nowrap;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      margin-right: 0.3rem;
    }
    .cine-title em { color: var(--pink); font-style: normal; }
    .cine-ep {
      color: var(--rose); font-size: 0.78rem;
      white-space: nowrap; margin-right: auto;
    }

    /* Episode chips */
    #ep-scroll {
      display: flex; gap: 0.4rem;
      overflow-x: auto; max-width: 50vw;
      scrollbar-width: none;
    }
    #ep-scroll::-webkit-scrollbar { display: none; }

    .ep-chip {
      flex-shrink: 0;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.12);
      color: var(--muted); border-radius: 5px;
      padding: 0.3rem 0.65rem; font-size: 0.75rem;
      cursor: pointer; font-family: var(--font-b);
      transition: all 0.2s; white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .ep-chip:hover { border-color: var(--rose); color: var(--rose); }
    .ep-chip.active { background: var(--pink); border-color: var(--pink); color: #fff; font-weight: 700; }

    .btn-ctrl {
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.12);
      color: var(--muted); border-radius: 5px;
      padding: 0.3rem 0.75rem; font-size: 0.82rem;
      cursor: pointer; font-family: var(--font-b);
      transition: all 0.2s; flex-shrink: 0;
      backdrop-filter: blur(8px);
    }
    .btn-ctrl:hover { border-color: var(--pink); color: var(--pink); }
    .btn-ctrl:disabled { opacity: 0.2; pointer-events: none; }
    .btn-ctrl.exit:hover { border-color: #ff4444; color: #ff4444; }

    /* Loading */
    #loading {
      position: fixed; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); font-family: var(--font-h);
      font-size: 2rem; letter-spacing: 5px; color: var(--pink);
    }

    @media (max-width: 600px) {
      .cine-title { font-size: 1rem; }
      #top-bar { padding: 0.6rem 0.8rem; gap: 0.4rem; }
      #ep-scroll { max-width: 38vw; }
      .ep-chip { font-size: 0.68rem; padding: 0.25rem 0.5rem; }
    }
  </style>
</head>
<body>

  <div id="loading">Cargando...</div>
  <div id="video-wrap"></div>

  <div id="ui">
    <div id="top-bar">
      <div class="cine-title" id="cine-title">Re<em>:</em>Anime</div>
      <div class="cine-ep" id="cine-ep"></div>
      <button class="btn-ctrl" id="btn-prev" onclick="stepEp(-1)">← Ep</button>
      <div id="ep-scroll"></div>
      <button class="btn-ctrl" id="btn-next" onclick="stepEp(1)">Ep →</button>
      <button class="btn-ctrl exit" onclick="history.length > 1 ? history.back() : location.href='index.html'">✕ Salir</button>
    </div>
  </div>

  <script>
    const animeId   = new URLSearchParams(location.search).get('id');
    const videoWrap = document.getElementById('video-wrap');
    const epScroll  = document.getElementById('ep-scroll');
    const loading   = document.getElementById('loading');
    const btnPrev   = document.getElementById('btn-prev');
    const btnNext   = document.getElementById('btn-next');

    let anime = null, epIndex = 0, idleTimer;

    /* Mostrar barra 3s tras cualquier movimiento */
    function wake() {
      document.body.classList.add('active');
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => document.body.classList.remove('active'), 3000);
    }
    document.addEventListener('mousemove', wake);
    document.addEventListener('touchstart', wake, { passive: true });
    wake();

    fetch('animes.json').then(r => r.json()).then(list => {
      anime = list.find(a => a.id === animeId);
      if (!anime) { loading.textContent = 'Anime no encontrado.'; return; }

      document.title = anime.name + ' · Modo Cine';
      document.getElementById('cine-title').innerHTML = anime.name + ' <em>·</em>';

      (anime.episodes || []).forEach((ep, i) => {
        const chip = document.createElement('button');
        chip.className = 'ep-chip';
        chip.textContent = 'Ep ' + ep.number;
        chip.title = ep.title;
        chip.onclick = () => loadEp(i);
        epScroll.appendChild(chip);
      });

      const last  = JSON.parse(localStorage.getItem('lastWatched') || 'null');
      const start = (last?.id === anime.id && last.index < anime.episodes.length) ? last.index : 0;
      loadEp(start);
    }).catch(() => { loading.textContent = 'Error cargando datos.'; });

    function loadEp(idx) {
      const ep = anime?.episodes?.[idx];
      if (!ep) return;
      epIndex = idx;

      Array.from(epScroll.children).forEach((c, i) => c.classList.toggle('active', i === idx));
      epScroll.children[idx]?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

      btnPrev.disabled = idx === 0;
      btnNext.disabled = idx === anime.episodes.length - 1;
      document.getElementById('cine-ep').textContent = 'Ep ' + ep.number + ': ' + ep.title;

      videoWrap.innerHTML = '';
      const tmp = document.createElement('div');
      tmp.innerHTML = ep.embed;
      const iframe = tmp.querySelector('iframe');
      if (iframe) {
        iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;';
        iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture';
        iframe.allowFullscreen = true;
        videoWrap.appendChild(iframe);
      } else {
        videoWrap.innerHTML = ep.embed;
      }

      localStorage.setItem('lastWatched', JSON.stringify({ id: anime.id, index: idx }));
      loading.style.display = 'none';
    }

    function stepEp(dir) {
      const n = epIndex + dir;
      if (n >= 0 && n < (anime?.episodes?.length || 0)) loadEp(n);
    }

    document.addEventListener('keydown', e => {
      wake();
      if (e.key === 'ArrowRight') stepEp(1);
      if (e.key === 'ArrowLeft')  stepEp(-1);
      if (e.key === 'Escape')     history.length > 1 ? history.back() : location.href = 'index.html';
    });
  </script>
</body>
</html>
