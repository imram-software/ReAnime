<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Perfil - Re:Anime</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #080808;
      --bg2:      #111111;
      --bg3:      #1a1a1a;
      --surface:  #161616;
      --border:   #222222;
      --pink:     #ff2d78;
      --pink-dim: #ff2d7822;
      --pink-glow:#ff2d7855;
      --rose:     #ff6fa8;
      --text:     #e8e8e8;
      --muted:    #666;
      --radius:   10px;
      --font-head:'Bebas Neue', cursive;
      --font-body:'DM Sans', sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 2px; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-top: 56px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 200px 200px; opacity: 0.4;
    }

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      background: rgba(8,8,8,0.88); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--font-head); font-size: 2rem;
      letter-spacing: 3px; color: var(--pink);
      text-decoration: none; text-shadow: 0 0 20px var(--pink-glow);
    }
    .logo span { color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 1rem; }

    #login-btn {
      background: var(--pink); color: #fff;
      padding: 0.4rem 1.1rem; border-radius: 6px;
      text-decoration: none; font-size: 0.85rem; font-weight: 700;
      transition: opacity 0.2s; box-shadow: 0 0 16px var(--pink-glow);
    }
    #login-btn:hover { opacity: 0.85; }

    #user-info { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; position: relative; }
    #user-info img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--pink); }
    #user-info span { font-size: 0.85rem; }
    #user-popup {
      position: absolute; top: 44px; right: 0;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem; min-width: 180px;
      display: none; z-index: 100;
    }
    #user-popup button {
      display: block; width: 100%; margin-top: 0.5rem;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 0.5rem;
      cursor: pointer; font-family: var(--font-body); font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    #user-popup button:hover { border-color: var(--pink); color: var(--pink); }

    /* ── LAYOUT ── */
    .page { max-width: 960px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--muted); font-size: 0.85rem; text-decoration: none;
      margin-bottom: 2rem; transition: color 0.2s; cursor: pointer;
      background: none; border: none; font-family: var(--font-body);
    }
    .back-btn:hover { color: var(--pink); }

    /* ── USER CARD ── */
    .user-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
      display: flex; align-items: center; gap: 1.5rem;
      margin-bottom: 3rem;
      position: relative; overflow: hidden;
    }
    .user-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--pink);
    }
    .user-card img {
      width: 72px; height: 72px; border-radius: 50%;
      border: 2px solid var(--pink);
      box-shadow: 0 0 20px var(--pink-glow);
    }
    .user-card-info strong {
      display: block; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.2rem;
    }
    .user-card-info small { color: var(--muted); font-size: 0.8rem; }
    .logout-btn {
      margin-left: auto; background: none;
      border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 0.4rem 0.9rem;
      font-size: 0.82rem; cursor: pointer; font-family: var(--font-body);
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--pink); color: var(--pink); }

    /* ── SECTION HEADERS ── */
    .section-header {
      display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.2rem;
    }
    .section-title {
      font-family: var(--font-head); font-size: 1.8rem;
      letter-spacing: 3px; color: var(--text);
    }
    .section-title em { color: var(--pink); font-style: normal; }
    .section-line { flex: 1; height: 1px; background: var(--border); }
    .section-count { font-size: 0.72rem; color: var(--muted); letter-spacing: 2px; }
    .section-wrap { margin-bottom: 3rem; }

    /* ── GRID ── */
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }
    .anime-card {
      position: relative; overflow: hidden;
      border-radius: var(--radius);
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; aspect-ratio: 2/3;
      transition: transform 0.3s, border-color 0.3s;
    }
    .anime-card:hover { transform: translateY(-5px) scale(1.02); border-color: var(--pink); }
    .anime-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: filter 0.3s; }
    .anime-card:hover img { filter: brightness(0.6); }
    .anime-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 55%);
      display: flex; align-items: flex-end; padding: 0.7rem;
    }
    .anime-card-title { font-size: 0.8rem; font-weight: 700; color: #fff; line-height: 1.3; }
    .anime-card::after {
      content: ''; position: absolute; top: 0; right: 0;
      width: 0; height: 0; border-style: solid;
      border-width: 0 24px 24px 0;
      border-color: transparent var(--pink) transparent transparent;
      opacity: 0; transition: opacity 0.3s;
    }
    .anime-card:hover::after { opacity: 1; }

    .no-data {
      color: var(--muted); font-size: 0.88rem;
      padding: 1.5rem 0; font-style: italic;
    }

    /* ── LIKES ── */
    .like-btn-wrap {
      display:flex; align-items:center; gap:0.7rem;
      margin-top:0.7rem;
    }
    .like-btn {
      display:inline-flex; align-items:center; gap:0.4rem;
      background:none; border:1px solid var(--border);
      color:var(--muted); border-radius:20px;
      padding:0.35rem 1rem; font-size:0.82rem;
      cursor:pointer; font-family:var(--font-body);
      transition:all 0.25s;
    }
    .like-btn:hover:not([disabled]) { border-color:var(--pink); color:var(--pink); }
    .like-btn.liked { border-color:var(--pink); color:var(--pink); background:var(--pink-dim); }
    .like-btn[disabled] { opacity:0.45; cursor:default; }
    .likes-count {
      font-family:var(--font-head); font-size:1.3rem;
      letter-spacing:1px; color:var(--text);
    }
    .likes-label { font-size:0.7rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border); padding: 2rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; position: relative; z-index: 1;
    }
    .footer-logo { font-family: var(--font-head); font-size: 1.5rem; color: var(--pink); letter-spacing: 3px; }
    footer p { font-size: 0.78rem; color: var(--muted); }
    footer a { color: var(--rose); text-decoration: none; }
    footer a:hover { color: var(--pink); }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .user-card { flex-wrap: wrap; }
      .logout-btn { margin-left: 0; }
      .anime-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  /* ── DISPLAY NAME editor ── */
      .display-name-wrap {
        display:flex; align-items:center; gap:0.5rem;
      }
      .display-name-text {
        font-size:1.1rem; font-weight:700;
      }
      .display-name-input {
        background:var(--bg3); border:1px solid var(--pink);
        color:var(--text); border-radius:6px;
        padding:0.3rem 0.6rem; font-size:1rem;
        font-family:var(--font-body); outline:none;
        max-width:200px; display:none;
      }
      .edit-name-btn {
        background:none; border:none; cursor:pointer;
        color:var(--muted); font-size:0.85rem; padding:0.1rem 0.3rem;
        transition:color 0.2s; line-height:1;
      }
      .edit-name-btn:hover { color:var(--pink); }
      .save-name-btn {
        background:var(--pink); border:none; color:#fff;
        border-radius:5px; padding:0.3rem 0.7rem;
        font-size:0.78rem; cursor:pointer; display:none;
        font-family:var(--font-body);
      }

    /* ── FEATURED CHARACTER ── */
    .featured-profile-wrap {
      display: flex;
      align-items: flex-start;
      gap: 2rem;
      flex-wrap: wrap;
      padding: 1.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Fondo decorativo con gradiente radial */
    .featured-profile-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 80% at 20% 50%, rgba(255,45,120,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    /* Linea decorativa izquierda */
    .featured-profile-wrap::after {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, transparent, var(--pink), transparent);
    }

    /* Carta de tamaño fijo */
    .featured-profile-card {
      width: 240px;
      height: 427px; /* 240 * 16/9 → no, 240*(3/2)=360, but user wants 427 ≈ 240*1.78 */
      flex-shrink: 0;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      border: 2px solid var(--border);
      background: var(--bg3);
    }
    .featured-profile-card.r5 { border-color: #fbbf24; box-shadow: 0 0 24px rgba(251,191,36,0.25), 0 0 60px rgba(251,191,36,0.08); }
    .featured-profile-card.r4 { border-color: #c084fc; box-shadow: 0 0 20px rgba(192,132,252,0.2); }
    .featured-profile-card.r3 { border-color: #38bdf8; box-shadow: 0 0 14px rgba(56,189,248,0.15); }

    .fp-gradient {
      position: absolute; inset: 0;
      z-index: 0;
    }
    .r5 .fp-gradient { background: linear-gradient(160deg, #1a0a00, #3d1900 45%, #7c3300 80%); }
    .r4 .fp-gradient { background: linear-gradient(160deg, #0d001a, #1e003d 45%, #3b0080 80%); }
    .r3 .fp-gradient { background: linear-gradient(160deg, #001220, #002444 45%, #003d6e 80%); }
    .r2 .fp-gradient { background: linear-gradient(160deg, #001a0a, #003018 50%, #004d28 80%); }
    .r1 .fp-gradient { background: linear-gradient(160deg, #0d0d0d, #181818 50%); }

    .fp-symbol {
      position: absolute; inset: 0; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem; opacity: 0.1; pointer-events: none;
    }
    .r5 .fp-symbol { color: #fbbf24; opacity: 0.18; font-size: 6rem; }
    .r4 .fp-symbol { color: #c084fc; opacity: 0.15; }

    .featured-profile-card img {
      position: absolute; inset: 0; z-index: 2;
      width: 100%; height: 100%;
      object-fit: cover; object-position: top;
      display: block;
    }

    /* Gradient overlay encima de la imagen */
    .featured-profile-card .fp-overlay {
      position: absolute; inset: 0; z-index: 3;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
    }

    /* Info al lado */
    .featured-profile-info {
      flex: 1;
      min-width: 180px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 0.5rem;
    }
    .fp-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--pink); border: 1px solid var(--pink-dim);
      border-radius: 20px; padding: 0.2rem 0.7rem;
      margin-bottom: 1rem; width: fit-content;
    }
    .fp-stars { font-size: 1rem; margin-bottom: 0.4rem; }
    .featured-profile-info h3 {
      font-family: var(--font-head);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: 3px; line-height: 1;
      color: var(--text); margin-bottom: 0.3rem;
    }
    .fp-anime { color: var(--pink); font-size: 0.85rem; margin-bottom: 1rem; }
    .featured-profile-info p {
      font-size: 0.83rem; color: var(--muted);
      line-height: 1.65; max-width: 400px;
    }

    /* Decoracion: numero de estrellas grande como marca de agua */
    .featured-profile-info::before {
      content: attr(data-stars);
      position: absolute; right: 0; top: 0;
      font-family: var(--font-head);
      font-size: 8rem; line-height: 1;
      color: var(--border); opacity: 0.4;
      pointer-events: none; user-select: none;
    }

    @media (max-width: 600px) {
      .featured-profile-card { width: 160px; height: 285px; }
      .featured-profile-wrap { gap: 1.2rem; padding: 1.2rem; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="index.html">Re<span>:</span>Anime</a>
    <div class="header-right">
      <a id="login-btn" href="#">Discord</a>
      <div id="user-info" class="hidden">
        <div id="user-popup"></div>
      </div>
    </div>
  </header>

  <div class="page" id="profile-content"></div>

  <footer>
    <div class="footer-logo">Re:Anime</div>
    <p>© 2025 Re:Anime — <a href="https://discord.com/users/781172416218136577" target="_blank">Ream</a></p>
  </footer>

  <script type="module" src="user_data.js"></script>

  <script>
    /* ── AUTH ── */
    const clientId    = "1390810180823945350";
    const redirectUri = "https://imram-software.github.io/ReAnime/callback.html";
    document.getElementById('login-btn').href =
      `https://discord.com/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify`;

    const selfUser   = JSON.parse(localStorage.getItem('user'));
    const viewId      = new URLSearchParams(location.search).get('id'); // ID del perfil a ver
    const isOwnProfile = !viewId || (selfUser && viewId === selfUser.id);
    const isGuestView  = !!viewId && !isOwnProfile; // viendo perfil ajeno

    /* ── Header auth (siempre muestra el usuario logueado, no el visto) ── */
    if (selfUser) {
      document.getElementById('login-btn').classList.add('hidden');
      const ui = document.getElementById('user-info');
      ui.classList.remove('hidden');
      const av = `https://cdn.discordapp.com/avatars/${selfUser.id}/${selfUser.avatar}.png`;
      ui.innerHTML = `<img src="${av}"/><span>${selfUser.username}</span><div id="user-popup"></div>`;
      ui.onclick = () => {
        const p = document.getElementById('user-popup');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
        p.innerHTML = `
          <strong>${selfUser.username}</strong><br>
          <img src="${av}" width="60" style="border-radius:50%;margin:0.5rem 0"><br>
          <button onclick="logout()">Cerrar sesion</button>
        `;
      };
    }

    function logout() {
      localStorage.removeItem('user');
      localStorage.removeItem('user_data');
      location.href = 'index.html';
    }

    /* ── Sin usuario propio y sin ID en URL ── */
    if (!selfUser && !viewId) {
      document.getElementById('profile-content').innerHTML = `
        <button class="back-btn" onclick="location.href='index.html'">← Volver al inicio</button>
        <p style="color:var(--muted);margin-top:4rem;text-align:center;">
          Debes iniciar sesion con Discord para ver tu perfil.
        </p>`;
    } else {
      /* Determinar que ID cargar */
      const targetId = viewId || selfUser.id;
      window._profileTargetId = targetId;

      /* animes.json una sola vez */
      const animesP = fetch('animes.json').then(r => r.json());

      const R_STARS  = { 5:'★★★★★',4:'★★★★☆',3:'★★★☆☆',2:'★★☆☆☆',1:'★☆☆☆☆' };
      const R_COLOR  = { 5:'#fbbf24',4:'#c084fc',3:'#38bdf8',2:'#86efac',1:'#94a3b8' };
      const R_SYMBOL = { 5:'★',4:'◆',3:'▲',2:'●',1:'─' };

      /* ── Cargar datos del perfil objetivo directamente de Firestore ── */
      async function loadTargetProfile() {
        /* Para perfil ajeno, leer Firestore directamente via REST API publica */
        try {
          const url = `https://firestore.googleapis.com/v1/projects/reanime-1a781/databases/(default)/documents/users/${targetId}?key=AIzaSyDjVVsA-22tvlsUbbDenoS_vWlWLNY-HsU`;
          const r   = await fetch(url);
          if (!r.ok) throw new Error('not found');
          const json = await r.json();
          return firestoreDocToObj(json);
        } catch {
          return null;
        }
      }

      /* Convierte formato REST de Firestore a objeto plano */
      function firestoreDocToObj(doc) {
        if (!doc.fields) return {};
        const out = {};
        for (const [k, v] of Object.entries(doc.fields)) {
          if (v.arrayValue)   out[k] = (v.arrayValue.values || []).map(parseFireVal);
          else if (v.mapValue) out[k] = firestoreDocToObj({ fields: v.mapValue.fields || {} });
          else                 out[k] = parseFireVal(v);
        }
        return out;
      }
      function parseFireVal(v) {
        if (v.stringValue  !== undefined) return v.stringValue;
        if (v.integerValue !== undefined) return parseInt(v.integerValue);
        if (v.doubleValue  !== undefined) return parseFloat(v.doubleValue);
        if (v.booleanValue !== undefined) return v.booleanValue;
        if (v.nullValue    !== undefined) return null;
        if (v.mapValue)    return firestoreDocToObj({ fields: v.mapValue.fields || {} });
        if (v.arrayValue)  return (v.arrayValue.values || []).map(parseFireVal);
        return null;
      }

      /* ── Renderizar todo ── */
      function renderAll(userData) {
        if (!userData) {
          if (isOwnProfile) {
            /* Usuario nuevo sin doc todavia — mostrar perfil vacio */
            userData = { discordId: selfUser?.id, discordUsername: selfUser?.username,
                         discordAvatar: selfUser?.avatar, favorites:[], watchlist:[],
                         completed:[], holy:0, featured:null, displayName:'' };
          } else {
            document.getElementById('profile-content').innerHTML = `
              <button class="back-btn" onclick="history.back()">← Volver</button>
              <p style="color:var(--muted);margin-top:4rem;text-align:center;">Perfil no encontrado.</p>`;
            return;
          }
        }

        /* ── Actualizar avatar y nombres desde datos de Firestore ── */
        const avatarEl = document.getElementById('profile-avatar');
        if (avatarEl && userData.discordAvatar && userData.discordId) {
          avatarEl.src = `https://cdn.discordapp.com/avatars/${userData.discordId}/${userData.discordAvatar}.png`;
        }

        const nameEl = document.getElementById('display-name-text');
        if (nameEl) {
          const display = userData.displayName || userData.discordUsername || `Usuario ${(userData.discordId||'????').slice(-4)}`;
          nameEl.textContent = display;
        }

        const unameEl = document.getElementById('profile-username');
        if (unameEl && userData.discordUsername) {
          unameEl.textContent = '@' + userData.discordUsername;
        }

        /* ── Inicializar editor de nombre (solo para uno mismo) ── */
        const isSelf = selfUser && selfUser.id === (userData.discordId || targetId);
        if (isSelf) initNameEditor(userData.displayName || '');

        /* ── Share button ── */
        const shareBtn = document.getElementById('share-btn');
        if (shareBtn) {
          shareBtn.onclick = () => {
            const url = location.origin + location.pathname + '?id=' + targetId;
            navigator.clipboard.writeText(url)
              .then(() => { shareBtn.textContent = '✓ Copiado!'; setTimeout(() => shareBtn.textContent = 'Compartir perfil', 2000); })
              .catch(() => {});
          };
        }

        renderFeaturedProfile(userData.featured || null);
        updateLikesDisplay(userData.likes || 0);
        initLikeBtn();
        animesP.then(all => {
          renderSection('favorites', all, userData.favorites || []);
          renderSection('watchlist', all, userData.watchlist || []);
          renderSection('watched',   all, userData.completed || []);
          if (isOwnProfile) renderHolyBadge(userData.holy || 0);
          renderConquest(userData.conquest || 0);
        });
      }

      function initNameEditor(currentName) {
        const nameText  = document.getElementById('display-name-text');
        const nameInput = document.getElementById('display-name-input');
        const editBtn   = document.getElementById('edit-name-btn');
        const saveBtn   = document.getElementById('save-name-btn');
        if (!editBtn || !nameInput || !saveBtn) return;

        editBtn.onclick = () => {
          nameInput.value = nameText.textContent.trim();
          nameText.style.display   = 'none';
          editBtn.style.display    = 'none';
          nameInput.style.display  = 'block';
          saveBtn.style.display    = 'inline-block';
          nameInput.focus();
        };

        const doSave = async () => {
          const val = nameInput.value.trim().slice(0, 32);
          if (val) nameText.textContent = val;
          nameText.style.display  = '';
          editBtn.style.display   = '';
          nameInput.style.display = 'none';
          saveBtn.style.display   = 'none';
          if (window.ReAnimeDB) await window.ReAnimeDB.setDisplayName(val);
        };

        saveBtn.onclick = doSave;
        nameInput.addEventListener('keydown', e => {
          if (e.key === 'Enter') doSave();
          if (e.key === 'Escape') {
            nameText.style.display  = '';
            editBtn.style.display   = '';
            nameInput.style.display = 'none';
            saveBtn.style.display   = 'none';
          }
        });
      }

      function renderFeaturedProfile(ch) {
        const el = document.getElementById('featured-profile-section');
        if (!el) return;
        if (!ch) { el.innerHTML = ''; return; }
        const rColor = R_COLOR[ch.stars] || '#94a3b8';
        const rClass = 'r' + ch.stars;
        const starLabel = '★'.repeat(ch.stars) + '☆'.repeat(5-ch.stars);
        el.innerHTML = `
          <div class="section-header" style="margin-bottom:1rem;">
            <h2 class="section-title">Personaje <em>Destacado</em></h2>
            <div class="section-line"></div>
          </div>
          <div class="featured-profile-wrap">
            <div class="featured-profile-card ${rClass}">
              <div class="fp-gradient"></div>
              <div class="fp-symbol">${R_SYMBOL[ch.stars]||'─'}</div>
              ${ch.image ? `<img src="${ch.image}" alt="${ch.name}" loading="lazy" onerror="this.style.display='none'" />` : ''}
              <div class="fp-overlay"></div>
            </div>
            <div class="featured-profile-info" data-stars="${starLabel}">
              <div class="fp-badge">✦ Personaje Destacado</div>
              <div class="fp-stars" style="color:${rColor};font-size:1.1rem;">${R_STARS[ch.stars]||'★'}</div>
              <h3>${ch.name}</h3>
              <div class="fp-anime">${ch.anime}</div>
              <p>${ch.description || ''}</p>
            </div>
          </div>`;
      }

      function renderHolyBadge(holy) {
        const el = document.getElementById('holy-profile-badge');
        if (el) el.textContent = holy.toLocaleString() + ' ✦ Holy';
      }

      function renderConquest(pts) {
        const el = document.getElementById('conquest-badge');
        if (el) el.textContent = (pts||0).toLocaleString() + ' ⚔ Conquista';
      }

      function updateLikesDisplay(count) {
        const el = document.getElementById('likes-count');
        if (el) el.textContent = (count || 0).toLocaleString();
      }

      async function initLikeBtn() {
        const btn = document.getElementById('like-btn');
        if (!btn) return;
        const selfUser2 = JSON.parse(localStorage.getItem('user'));
        if (!selfUser2) {
          btn.title = 'Inicia sesion para dar like';
          btn.setAttribute('disabled', true);
          return;
        }
        // Check if already liked today
        if (window.ReAnimeDB) {
          const alreadyToday = await window.ReAnimeDB.hasLikedToday(targetId);
          if (alreadyToday) {
            btn.textContent = '♥ Liked';
            btn.classList.add('liked');
            btn.setAttribute('disabled', true);
            btn.title = 'Ya diste like hoy, vuelve mañana';
          }
        } else {
          // Check localStorage fallback
          const today = new Date().toISOString().slice(0,10);
          const key = 'liked_' + targetId;
          if (localStorage.getItem(key) === today) {
            btn.textContent = '♥ Liked';
            btn.classList.add('liked');
            btn.setAttribute('disabled', true);
          }
        }
      }



      /* ── Iniciar carga ── */
      buildProfileShell(targetId);

      if (isOwnProfile) {
        /* Perfil propio: esperar siempre a ReAnimeDB (crea el doc si no existe) */
        const doLoad = () => window.ReAnimeDB.loadUserData().then(renderAll);
        if (window.ReAnimeDB) doLoad();
        else window.addEventListener('reanimdb:ready', doLoad, { once: true });

        /* Actualizacion en tiempo real */
        window.addEventListener('reanimdb:update', e => renderAll(e.detail));
      } else {
        /* Perfil ajeno: leer via REST */
        loadTargetProfile().then(renderAll);
      }
    }

    function buildProfileShell(targetId) {
      const isSelf   = selfUser && selfUser.id === targetId;
      const shareUrl = location.origin + location.pathname + '?id=' + targetId;

      // Avatar y nombre se actualizaran cuando lleguen los datos de Firestore
      const placeholderAvatar = isSelf && selfUser.avatar
        ? `https://cdn.discordapp.com/avatars/${selfUser.id}/${selfUser.avatar}.png`
        : 'https://cdn.discordapp.com/embed/avatars/0.png';
      const placeholderName = isSelf ? (selfUser.username || '...') : '...';

      document.getElementById('profile-content').innerHTML = `
        <button class="back-btn" onclick="history.length>1?history.back():location.href='index.html'">← Volver</button>
        <div class="user-card">
          <img id="profile-avatar" src="${placeholderAvatar}" alt="Avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" />
          <div class="user-card-info">
            <div class="display-name-wrap">
              <span class="display-name-text" id="display-name-text">
                ${placeholderName}
              </span>
              ${isSelf ? `<button class="edit-name-btn" id="edit-name-btn" title="Editar nombre">✏</button>` : ''}
            </div>
            ${isSelf ? `<input class="display-name-input" id="display-name-input" maxlength="32" placeholder="Tu nombre..." /><button class="save-name-btn" id="save-name-btn">Guardar</button>` : ''}
            <small id="profile-username" style="color:var(--muted);font-size:0.75rem;display:block;margin-top:0.15rem;"></small>
            <small id="holy-profile-badge" style="color:#a78bfa;font-size:0.78rem;display:block;margin-top:0.1rem;"></small>
            <small id="conquest-badge" style="color:#fbbf24;font-size:0.78rem;display:block;margin-top:0.1rem;"></small>
          </div>
          <div style="margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem;">
            <div style="display:flex;align-items:baseline;gap:0.4rem;">
              <span class="likes-count" id="likes-count">—</span>
              <span class="likes-label">likes</span>
            </div>
            ${!isSelf ? `<div class="like-btn-wrap"><button class="like-btn" id="like-btn" onclick="handleLike()">♡ Like</button></div>` : ''}
          </div>
          ${isSelf ? `<button class="logout-btn" onclick="logout()">Cerrar sesion</button>` : ''}
          <button class="logout-btn" style="margin-left:${isSelf?'0':'auto'}" id="share-btn">Compartir perfil</button>
        </div>
        <div id="featured-profile-section"></div>
        <div class="section-wrap">
          <div class="section-header">
            <h2 class="section-title"><em>Favoritos</em></h2>
            <div class="section-line"></div>
            <span class="section-count" id="count-favorites"></span>
          </div>
          <div id="favorites" class="anime-grid"><p class="no-data">Cargando...</p></div>
        </div>
        <div class="section-wrap">
          <div class="section-header">
            <h2 class="section-title">Ver <em>despues</em></h2>
            <div class="section-line"></div>
            <span class="section-count" id="count-watchlist"></span>
          </div>
          <div id="watchlist" class="anime-grid"><p class="no-data">Cargando...</p></div>
        </div>
        <div class="section-wrap">
          <div class="section-header">
            <h2 class="section-title"><em>Vistos</em></h2>
            <div class="section-line"></div>
            <span class="section-count" id="count-watched"></span>
          </div>
          <div id="watched" class="anime-grid"><p class="no-data">Cargando...</p></div>
        </div>
      `;
    }

    function renderSection(sectionId, allAnimes, ids) {
      const container = document.getElementById(sectionId);
      const countEl   = document.getElementById('count-' + sectionId);
      if (!container) return;
      if (!ids.length) {
        if (countEl) countEl.textContent = '0 titulos';
        container.innerHTML = `<p class="no-data">Sin animes en esta lista.</p>`;
        return;
      }
      const filtered = allAnimes.filter(a => ids.includes(a.id));
      if (countEl) countEl.textContent = `${filtered.length} titulo${filtered.length !== 1 ? 's' : ''}`;
      container.innerHTML = '';
      filtered.forEach(anime => {
        const card = document.createElement('div');
        card.className = 'anime-card';
        card.onclick = () => location.href = `anime.html?id=${anime.id}`;
        card.innerHTML = `
          <img src="${anime.cover}" alt="${anime.name}" loading="lazy" />
          <div class="anime-card-overlay">
            <div class="anime-card-title">${anime.name}</div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    /* handleLike en scope global — accede a targetId via window */
    async function handleLike() {
      const tid = window._profileTargetId;
      if (!tid) return;
      const btn = document.getElementById('like-btn');
      if (!btn || btn.disabled) return;
      btn.setAttribute('disabled', true);
      btn.textContent = '...';

      let result;
      if (window.ReAnimeDB) {
        result = await window.ReAnimeDB.likeProfile(tid);
      } else {
        const today = new Date().toISOString().slice(0,10);
        const key = 'liked_' + tid;
        result = localStorage.getItem(key) === today ? 'already_today' : 'ok';
        if (result === 'ok') localStorage.setItem(key, today);
      }

      if (result === 'ok') {
        btn.textContent = '♥ Liked';
        btn.classList.add('liked');
        btn.title = 'Vuelve mañana para dar like de nuevo';
        const countEl = document.getElementById('likes-count');
        if (countEl) {
          const cur = parseInt(countEl.textContent.replace(/,/g,'')) || 0;
          countEl.textContent = (cur + 1).toLocaleString();
        }
      } else if (result === 'already_today') {
        btn.textContent = '♥ Liked';
        btn.classList.add('liked');
        btn.title = 'Ya diste like hoy';
      } else if (result === 'not_logged_in') {
        btn.textContent = '♡ Like';
        btn.removeAttribute('disabled');
        alert('Inicia sesion con Discord para dar like.');
      }
    }
  </script>
</body>
</html>
