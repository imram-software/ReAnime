<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Re:Anime · Catálogo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet"/>
  <style>
:root{
  --bg:#080808;--bg2:#111;--bg3:#1a1a1a;--surface:#161616;--border:#222;
  --pink:#ff2d78;--pink-dim:#ff2d7822;--pink-glow:#ff2d7855;--rose:#ff6fa8;
  --text:#e8e8e8;--muted:#666;--radius:10px;
  --font-head:'Bebas Neue',cursive;--font-body:'DM Sans',sans-serif;--font-jp:'Noto Sans JP',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--pink);border-radius:2px;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");background-size:200px;opacity:.4;}

/* ── HEADER ── */
header{position:fixed;top:0;left:0;right:0;z-index:900;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:rgba(8,8,8,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.logo{font-family:var(--font-head);font-size:2rem;letter-spacing:3px;color:var(--pink);text-decoration:none;text-shadow:0 0 20px var(--pink-glow);}
.logo span{color:var(--text);}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:.4rem .9rem;font-size:.82rem;cursor:pointer;font-family:var(--font-body);transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;}
.back-btn:hover{border-color:var(--pink);color:var(--pink);}

/* ── PAGE ── */
.page{padding-top:56px;position:relative;z-index:1;}

/* ── HERO CATALOG ── */
.cat-hero{padding:3rem 2rem 2rem;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.cat-hero-left h1{font-family:var(--font-head);font-size:clamp(3rem,7vw,5rem);letter-spacing:5px;line-height:.9;margin-bottom:.4rem;}
.cat-hero-left h1 em{color:var(--pink);font-style:normal;}
.cat-hero-sub{font-size:.82rem;color:var(--muted);letter-spacing:2px;}
.cat-total{font-family:var(--font-head);font-size:2.5rem;letter-spacing:2px;color:var(--pink);text-align:right;}
.cat-total small{display:block;font-family:var(--font-body);font-size:.72rem;color:var(--muted);letter-spacing:2px;font-weight:400;}

/* ── SEARCH BAR ── */
.cat-search-wrap{padding:0 2rem 1.5rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;}
#cat-search{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.6rem 1.1rem;font-size:.92rem;font-family:var(--font-body);outline:none;flex:1;min-width:240px;transition:border-color .2s;}
#cat-search::placeholder{color:var(--muted);}
#cat-search:focus{border-color:var(--pink);box-shadow:0 0 0 2px var(--pink-dim);}
#search-count{font-size:.75rem;color:var(--muted);letter-spacing:1px;}

/* ── GENRE CHIPS ── */
.genre-bar{padding:0 2rem 1.5rem;display:flex;gap:.5rem;overflow-x:auto;flex-wrap:nowrap;}
.genre-bar::-webkit-scrollbar{height:2px;}
.gchip{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:30px;padding:.3rem .85rem;font-size:.75rem;cursor:pointer;transition:all .2s;font-family:var(--font-body);white-space:nowrap;}
.gchip:hover{border-color:var(--rose);color:var(--rose);}
.gchip.active{background:var(--pink);border-color:var(--pink);color:#fff;}

/* ── SECTION ── */
.cat-section{margin-bottom:2.5rem;}
.sec-header{display:flex;align-items:baseline;justify-content:space-between;padding:0 2rem .8rem;}
.sec-title{font-family:var(--font-head);font-size:1.8rem;letter-spacing:3px;}
.sec-title em{color:var(--pink);font-style:normal;}
.sec-line{flex:1;height:1px;background:var(--border);margin:0 1rem;}
.sec-count{font-size:.7rem;color:var(--muted);letter-spacing:2px;}

/* ── SLIDER ── */
.slider-wrap{overflow:hidden;padding:0 2rem;cursor:grab;user-select:none;}
.slider-wrap.dragging{cursor:grabbing;}
.slider-track{display:flex;gap:.85rem;}

/* ── CARD — 2/3 portrait ── */
.acard{flex:0 0 170px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .3s,border-color .3s;position:relative;aspect-ratio:2/3;}
.acard:hover{transform:translateY(-6px) scale(1.03);border-color:var(--pink);}
.acard img{width:100%;height:100%;object-fit:cover;display:block;transition:filter .3s;}
.acard:hover img{filter:brightness(.6);}
.acard-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:.7rem;}
.acard-name{font-size:.78rem;font-weight:700;color:#fff;line-height:1.25;margin-bottom:.15rem;}
.acard-genre{font-size:.58rem;color:var(--pink);opacity:0;transform:translateY(4px);transition:all .3s;font-family:var(--font-jp);}
.acard:hover .acard-genre{opacity:1;transform:translateY(0);}
.acard::after{content:'';position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 22px 22px 0;border-color:transparent var(--pink) transparent transparent;opacity:0;transition:opacity .3s;}
.acard:hover::after{opacity:1;}

/* Rank badge */
.rank-badge{position:absolute;top:6px;left:6px;font-family:var(--font-head);font-size:1.1rem;letter-spacing:1px;color:#fff;background:rgba(0,0,0,.6);border-radius:4px;padding:.05rem .35rem;z-index:2;}
.rank-badge.gold{color:#fbbf24;}
.rank-badge.silver{color:#94a3b8;}
.rank-badge.bronze{color:#c97f4a;}

/* Slider nav */
.slider-nav{display:flex;justify-content:flex-end;gap:.4rem;padding:.4rem 2rem 0;}
.snav{width:30px;height:30px;border:1px solid var(--border);border-radius:50%;background:none;color:var(--muted);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.snav:hover{border-color:var(--pink);color:var(--pink);}

/* ── FULL GRID ── */
.full-grid-section{padding:0 2rem 3rem;}
#full-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:1rem;}
.full-acard{border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .3s,border-color .3s;position:relative;aspect-ratio:2/3;}
.full-acard:hover{transform:translateY(-5px) scale(1.02);border-color:var(--pink);}
.full-acard img{width:100%;height:100%;object-fit:cover;display:block;transition:filter .3s;}
.full-acard:hover img{filter:brightness(.6);}
.full-acard-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:.7rem;}
.full-acard-name{font-size:.78rem;font-weight:700;color:#fff;line-height:1.25;}
.full-acard-genre{font-size:.58rem;color:var(--pink);margin-top:.1rem;}
.full-acard::after{content:'';position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 22px 22px 0;border-color:transparent var(--pink) transparent transparent;opacity:0;transition:opacity .3s;}
.full-acard:hover::after{opacity:1;}

/* ── PAGINATION ── */
#pag-bar{display:flex;align-items:center;justify-content:center;gap:.4rem;padding:1.5rem 0 2rem;flex-wrap:wrap;}
.pag-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:.35rem .7rem;font-size:.8rem;cursor:pointer;font-family:var(--font-body);transition:all .2s;min-width:36px;text-align:center;}
.pag-btn:hover:not(:disabled){border-color:var(--rose);color:var(--rose);}
.pag-btn.active{background:var(--pink);border-color:var(--pink);color:#fff;}
.pag-btn:disabled{opacity:.3;cursor:default;}
.pag-info{font-size:.75rem;color:var(--muted);padding:.35rem .5rem;}

/* ── NO RESULTS ── */
.no-results{padding:3rem 2rem;text-align:center;color:var(--muted);font-size:.9rem;}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.footer-logo{font-family:var(--font-head);font-size:1.5rem;color:var(--pink);letter-spacing:3px;}
footer p{font-size:.78rem;color:var(--muted);}
footer a{color:var(--rose);text-decoration:none;}

@media(max-width:600px){
  .acard{flex:0 0 135px;}
  #full-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
}
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Re<span>:</span>Anime</a>
  <a class="back-btn" href="index.html">← Inicio</a>
</header>

<div class="page">

  <div class="cat-hero">
    <div class="cat-hero-left">
      <h1>Catálogo<br><em>Anime</em></h1>
      <div class="cat-hero-sub">アニメ · Directorio completo · Re:Anime</div>
    </div>
    <div class="cat-total">
      <span id="total-count">—</span>
      <small>TÍTULOS</small>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="cat-search-wrap">
    <input id="cat-search" type="text" placeholder="Buscar por nombre o género…" oninput="onSearch()"/>
    <span id="search-count"></span>
  </div>

  <!-- GENRE CHIPS -->
  <div class="genre-bar" id="genre-bar"></div>

  <!-- DYNAMIC CONTENT: sliders when no filter, grid when searching -->
  <div id="sliders-view">

    <!-- DESTACADOS -->
    <div class="cat-section">
      <div class="sec-header">
        <h2 class="sec-title"><em>Destacados</em></h2>
        <div class="sec-line"></div>
        <span class="sec-count" id="count-dest"></span>
      </div>
      <div class="slider-wrap" id="sw-dest"><div class="slider-track" id="st-dest"></div></div>
      <div class="slider-nav"><button class="snav" id="prev-dest">←</button><button class="snav" id="next-dest">→</button></div>
    </div>

    <!-- POR GÉNERO (top 3) -->
    <div id="genre-sections"></div>

    <!-- TODOS (slider) -->
    <div class="cat-section">
      <div class="sec-header">
        <h2 class="sec-title">Todo el <em>Catálogo</em></h2>
        <div class="sec-line"></div>
        <span class="sec-count" id="count-all"></span>
      </div>
      <div class="slider-wrap" id="sw-all"><div class="slider-track" id="st-all"></div></div>
      <div class="slider-nav"><button class="snav" id="prev-all">←</button><button class="snav" id="next-all">→</button></div>
    </div>
  </div>

  <!-- SEARCH / FILTER GRID -->
  <div id="grid-view" style="display:none;">
    <div class="sec-header" style="padding-top:.5rem;">
      <h2 class="sec-title">Resultados</h2>
      <div class="sec-line"></div>
      <span class="sec-count" id="grid-count"></span>
    </div>
    <div class="full-grid-section">
      <div id="full-grid"></div>
      <div id="pag-bar"></div>
    </div>
  </div>

  <footer>
    <div class="footer-logo">Re:Anime</div>
    <p>© 2025 Re:Anime — <a href="https://discord.com/users/781172416218136577" target="_blank">Ream</a></p>
  </footer>
</div>

<script>
const PAGE_SIZE = 30;
let allAnimes   = [];
let filtered    = [];
let currentPage = 1;
let activeGenres = new Set();
let searching   = false;

/* ── LOAD ── */
fetch('animes.json')
  .then(r => r.json())
  .then(data => {
    allAnimes = data;
    document.getElementById('total-count').textContent = data.length;
    buildGenreBar();
    buildSliders();
  })
  .catch(() => {
    document.getElementById('total-count').textContent = '?';
  });

function goTo(id) {
  location.href = `anime.html?id=${encodeURIComponent(id)}`;
}

/* ── GENRE BAR ── */
function buildGenreBar() {
  const bar = document.getElementById('genre-bar');
  const genres = Array.from(new Set(allAnimes.flatMap(a => a.genre || []))).sort();
  bar.innerHTML = '';
  genres.forEach(g => {
    const ch = document.createElement('button');
    ch.className = 'gchip';
    ch.textContent = g;
    ch.dataset.g = g;
    ch.onclick = () => {
      ch.classList.toggle('active');
      activeGenres.has(g) ? activeGenres.delete(g) : activeGenres.add(g);
      currentPage = 1;
      applyFilter();
    };
    bar.appendChild(ch);
  });
}

/* ── FILTER / SEARCH ── */
function onSearch() {
  currentPage = 1;
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('cat-search').value.toLowerCase().trim();
  searching = q.length > 0 || activeGenres.size > 0;

  if (!searching) {
    document.getElementById('sliders-view').style.display = 'block';
    document.getElementById('grid-view').style.display    = 'none';
    document.getElementById('search-count').textContent   = '';
    return;
  }

  filtered = allAnimes.filter(a => {
    const nameMatch  = !q || a.name.toLowerCase().includes(q);
    const genreMatch = activeGenres.size === 0 || [...activeGenres].every(g => (a.genre||[]).includes(g));
    return nameMatch && genreMatch;
  });

  document.getElementById('sliders-view').style.display = 'none';
  document.getElementById('grid-view').style.display    = 'block';
  document.getElementById('search-count').textContent   = `${filtered.length} resultado${filtered.length!==1?'s':''}`;
  renderGrid();
}

/* ── GRID (filtered results) ── */
function renderGrid() {
  const grid    = document.getElementById('full-grid');
  const pagBar  = document.getElementById('pag-bar');
  const total   = filtered.length;
  const totPag  = Math.ceil(total / PAGE_SIZE);
  currentPage   = Math.min(currentPage, Math.max(1, totPag));
  const start   = (currentPage-1)*PAGE_SIZE;
  const page    = filtered.slice(start, start+PAGE_SIZE);

  document.getElementById('grid-count').textContent = `${total} título${total!==1?'s':''}`;

  grid.innerHTML = '';
  if (!page.length) {
    grid.innerHTML = '<div class="no-results">Sin resultados para tu búsqueda. Prueba con otros términos o géneros.</div>';
    pagBar.innerHTML = '';
    return;
  }

  page.forEach(a => {
    const el = document.createElement('div');
    el.className = 'full-acard';
    el.innerHTML = `
      <img src="${a.cover}" alt="${a.name}" loading="lazy"/>
      <div class="full-acard-overlay">
        <div class="full-acard-name">${a.name}</div>
        <div class="full-acard-genre">${(a.genre||[]).slice(0,2).join(' · ')}</div>
      </div>`;
    el.onclick = () => goTo(a.id);
    grid.appendChild(el);
  });

  renderPag(pagBar, total, totPag);
}

function renderPag(bar, total, totPag) {
  bar.innerHTML = '';
  if (totPag <= 1) return;

  const mkBtn = (label, page, active, disabled) => {
    const b = document.createElement('button');
    b.className = 'pag-btn' + (active?' active':'');
    b.textContent = label; b.disabled = disabled;
    if (!disabled) b.onclick = () => {
      currentPage = page;
      renderGrid();
      document.getElementById('full-grid').scrollIntoView({behavior:'smooth',block:'start'});
    };
    bar.appendChild(b);
  };
  const mkInfo = t => { const s=document.createElement('span'); s.className='pag-info'; s.textContent=t; bar.appendChild(s); };

  mkBtn('←', currentPage-1, false, currentPage===1);

  const pages = [];
  if (totPag<=7) { for(let i=1;i<=totPag;i++) pages.push(i); }
  else {
    pages.push(1);
    if(currentPage>3) pages.push('…');
    for(let i=Math.max(2,currentPage-1);i<=Math.min(totPag-1,currentPage+1);i++) pages.push(i);
    if(currentPage<totPag-2) pages.push('…');
    pages.push(totPag);
  }
  pages.forEach(p => {
    if(p==='…') mkInfo('…');
    else mkBtn(p, p, p===currentPage, false);
  });

  mkBtn('→', currentPage+1, false, currentPage===totPag);
  mkInfo(`${(currentPage-1)*PAGE_SIZE+1}–${Math.min(currentPage*PAGE_SIZE,total)} de ${total}`);
}

/* ══════════════════════════════════════
   SLIDERS
══════════════════════════════════════ */
function buildSliders() {
  // DESTACADOS — shuffle then take top 20
  const shuffled = [...allAnimes].sort(()=>Math.random()-.5);
  const featured = shuffled.slice(0, Math.min(20, allAnimes.length));
  buildSlider('dest', featured, false);
  document.getElementById('count-dest').textContent = featured.length + ' seleccionados';

  // GENRE SECTIONS — top 4 genres by count
  const genreCount = {};
  allAnimes.forEach(a => (a.genre||[]).forEach(g => { genreCount[g]=(genreCount[g]||0)+1; }));
  const topGenres = Object.entries(genreCount).sort((a,b)=>b[1]-a[1]).slice(0,4).map(e=>e[0]);
  
  const genSec = document.getElementById('genre-sections');
  genSec.innerHTML = '';
  topGenres.forEach((g, gi) => {
    const animes = allAnimes.filter(a=>(a.genre||[]).includes(g));
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.innerHTML = `
      <div class="sec-header">
        <h2 class="sec-title">${g === topGenres[0] ? '<em>' : ''}${g}${g === topGenres[0] ? '</em>' : ''}</h2>
        <div class="sec-line"></div>
        <span class="sec-count">${animes.length} títulos</span>
      </div>
      <div class="slider-wrap" id="sw-g${gi}"><div class="slider-track" id="st-g${gi}"></div></div>
      <div class="slider-nav"><button class="snav" id="prev-g${gi}">←</button><button class="snav" id="next-g${gi}">→</button></div>`;
    genSec.appendChild(sec);
    buildSlider('g'+gi, animes.slice(0,20), true);
  });

  // ALL — full catalog shuffled
  buildSlider('all', [...allAnimes].sort(()=>Math.random()-.5), false);
  document.getElementById('count-all').textContent = allAnimes.length + ' títulos';
}

function buildSlider(id, animes, showRank) {
  const track = document.getElementById('st-'+id);
  if (!track) return;
  track.innerHTML = '';
  animes.forEach((a, i) => {
    const el = document.createElement('div');
    el.className = 'acard';
    const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    el.innerHTML = `
      ${showRank && i<3 ? `<div class="rank-badge ${rankClass}">#${i+1}</div>` : ''}
      <img src="${a.cover}" alt="${a.name}" loading="lazy" onerror="this.style.display='none'"/>
      <div class="acard-overlay">
        <div class="acard-name">${a.name}</div>
        <div class="acard-genre">${(a.genre||[]).slice(0,2).join(' · ')}</div>
      </div>`;
    el.onclick = () => goTo(a.id);
    track.appendChild(el);
  });
  initSlider(id);
}

/* ── SLIDER ENGINE ── */
function initSlider(id) {
  const wrap  = document.getElementById('sw-'+id);
  const track = document.getElementById('st-'+id);
  const prev  = document.getElementById('prev-'+id);
  const next  = document.getElementById('next-'+id);
  if (!wrap || !track) return;

  let pos=0, dragStart=null, dragBase=0, dragDelta=0, dragActive=false, blockClick=false;

  const cardW = () => {
    const c = track.querySelector('.acard');
    return c ? c.getBoundingClientRect().width + 13 : 185;
  };
  const maxPos = () => Math.max(0, track.scrollWidth - wrap.clientWidth - 32);
  const setPos = (p, animated) => {
    pos = Math.max(0, Math.min(p, maxPos()));
    track.style.transition = animated ? 'transform .42s cubic-bezier(.77,0,.18,1)' : 'none';
    track.style.transform  = `translateX(-${pos}px)`;
  };

  if (next) next.onclick = () => setPos(pos + cardW()*3, true);
  if (prev) prev.onclick = () => setPos(pos - cardW()*3, true);

  wrap.addEventListener('mousedown', e => {
    if (e.button!==0) return;
    e.preventDefault();
    dragStart=e.clientX; dragBase=pos; dragDelta=0; dragActive=false;
    track.style.transition='none';
    wrap.classList.add('dragging');
  });
  window.addEventListener('mousemove', e => {
    if(dragStart===null) return;
    dragDelta = e.clientX-dragStart;
    if(Math.abs(dragDelta)>6){dragActive=true; track.style.transform=`translateX(-${dragBase-dragDelta}px)`;}
  });
  window.addEventListener('mouseup', () => {
    if(dragStart===null) return;
    wrap.classList.remove('dragging');
    const wasDrag=dragActive; dragStart=null; dragActive=false;
    if(wasDrag){blockClick=true; setPos(dragBase-dragDelta,true);}
    dragDelta=0;
  });
  wrap.addEventListener('click',e=>{if(blockClick){e.preventDefault();e.stopImmediatePropagation();blockClick=false;}},true);

  let tx=null, tb=0, td=0;
  wrap.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;tb=pos;td=0;track.style.transition='none';},{passive:true});
  wrap.addEventListener('touchmove',e=>{if(tx===null)return;td=e.touches[0].clientX-tx;track.style.transform=`translateX(-${tb-td}px)`;},{passive:true});
  wrap.addEventListener('touchend',()=>{if(tx===null)return;tx=null;setPos(tb-td,true);td=0;});
}
</script>
</body>
