<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Re:Anime · PVP</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
:root{--bg:#080808;--bg2:#111;--bg3:#1a1a1a;--surface:#161616;--border:#222;--pink:#ff2d78;--pink-dim:#ff2d7822;--pink-glow:#ff2d7855;--rose:#ff6fa8;--text:#e8e8e8;--muted:#555;--r5:#fbbf24;--r4:#c084fc;--r3:#38bdf8;--r2:#86efac;--r1:#94a3b8;--font-h:'Bebas Neue',cursive;--font-b:'DM Sans',sans-serif;--radius:10px;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--pink);border-radius:2px;}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");background-size:200px;opacity:.4;}

header{position:fixed;top:0;left:0;right:0;z-index:900;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:rgba(8,8,8,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.logo{font-family:var(--font-h);font-size:2rem;letter-spacing:3px;color:var(--pink);text-decoration:none;}
.logo span{color:var(--text);}
.hdr-right{display:flex;align-items:center;gap:.75rem;}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:.4rem .9rem;font-size:.82rem;cursor:pointer;font-family:var(--font-b);transition:all .2s;}
.back-btn:hover{border-color:var(--pink);color:var(--pink);}

.page{max-width:1200px;margin:0 auto;padding:68px 1rem 3rem;position:relative;z-index:1;}

/* ── TEAMS ROW ── */
.teams-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
@media(max-width:700px){.teams-row{grid-template-columns:1fr;}}

.team-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;}
.team-panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}
.team-panel-title{font-family:var(--font-h);font-size:1.4rem;letter-spacing:2px;}
.save-btn{background:var(--pink);border:none;color:#fff;border-radius:6px;padding:.35rem .9rem;font-family:var(--font-h);font-size:.85rem;letter-spacing:2px;cursor:pointer;transition:opacity .2s;box-shadow:0 0 12px var(--pink-glow);}
.save-btn:hover{opacity:.85;}
.save-btn.def{background:linear-gradient(135deg,#1e3a5f,#2563eb);box-shadow:0 0 12px rgba(37,99,235,.4);}

/* Slots */
.team-slots{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;}
.team-slot{aspect-ratio:2/3;border-radius:8px;border:2px dashed var(--border);background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.team-slot:hover:not(.filled){border-color:var(--pink);opacity:.8;}
.team-slot.filled{border-style:solid;border-color:var(--border);}
.slot-empty-lbl{font-size:.55rem;color:var(--muted);letter-spacing:1px;margin-top:.3rem;}
.slot-fill{width:100%;height:100%;position:relative;}
.slot-bg{position:absolute;inset:0;}
.slot-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;z-index:1;}
.slot-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 55%);z-index:2;}
.slot-aff{position:absolute;top:3px;left:4px;font-size:.7rem;z-index:3;}
.slot-info{position:absolute;bottom:0;left:0;right:0;padding:.3rem .4rem;z-index:3;}
.slot-name{font-family:var(--font-h);font-size:.65rem;letter-spacing:1px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slot-role{font-size:.5rem;color:rgba(255,255,255,.45);}
.slot-rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.75);border:none;color:var(--muted);border-radius:50%;width:16px;height:16px;font-size:.55rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:4;transition:all .2s;}
.slot-rm:hover{background:var(--pink);color:#fff;}

/* ── PVP CHARACTER GRID ── */
.pvp-section-title{font-family:var(--font-h);font-size:1.6rem;letter-spacing:3px;margin-bottom:.3rem;}
.pvp-section-title em{color:var(--pink);font-style:normal;}
.pvp-section-sub{color:var(--muted);font-size:.78rem;margin-bottom:1rem;}
.pvp-filter-row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem;}
.pvp-search{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.4rem .8rem;font-size:.82rem;font-family:var(--font-b);outline:none;min-width:180px;}
.pvp-search:focus{border-color:var(--pink);}
.fchip{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:.28rem .7rem;font-size:.72rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
.fchip:hover{border-color:var(--rose);color:var(--rose);}
.fchip.active{background:var(--pink);border-color:var(--pink);color:#fff;}

.pvp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.75rem;}

/* PVP char card */
.pvp-card{border-radius:var(--radius);border:2px solid var(--border);background:var(--bg3);overflow:hidden;transition:border-color .2s;position:relative;}
.pvp-card.r5{border-color:#fbbf2433;} .pvp-card.r4{border-color:#c084fc33;} .pvp-card.r3{border-color:#38bdf833;}
.pvp-card.in-atk{border-color:var(--pink) !important;box-shadow:0 0 10px var(--pink-glow);}
.pvp-card.in-def{border-color:#3b82f6 !important;box-shadow:0 0 10px rgba(59,130,246,.35);}
.pvp-card.in-both{border-color:#a78bfa !important;box-shadow:0 0 10px rgba(167,139,250,.35);}
.pvp-face{height:110px;position:relative;overflow:hidden;}
.pvp-face-bg{position:absolute;inset:0;}
.pvp-face img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;z-index:1;}
.pvp-face-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 55%);z-index:2;}
.pvp-face-aff{position:absolute;top:3px;right:4px;font-size:.7rem;z-index:3;}
.pvp-face-team{position:absolute;top:3px;left:4px;font-size:.65rem;z-index:3;display:flex;gap:2px;}
.team-badge{border-radius:4px;padding:0 3px;font-weight:700;font-size:.6rem;}
.badge-atk{background:var(--pink);color:#fff;}
.badge-def{background:#2563eb;color:#fff;}
.pvp-info{padding:.4rem .5rem .35rem;}
.pvp-name{font-family:var(--font-h);font-size:.8rem;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pvp-meta{font-size:.58rem;color:var(--muted);margin-top:.05rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Quick-add buttons */
.pvp-btns{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:0 .4rem .4rem;}
.qadd{border:none;border-radius:4px;padding:.25rem;font-size:.6rem;cursor:pointer;font-family:var(--font-h);letter-spacing:1px;transition:opacity .2s;}
.qadd:hover{opacity:.8;}
.qadd.atk{background:var(--pink);color:#fff;}
.qadd.def{background:#2563eb;color:#fff;}
.qadd.rm-atk{background:rgba(255,45,120,.15);color:var(--pink);border:1px solid var(--pink);}
.qadd.rm-def{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid #3b82f6;}
.qadd:disabled{opacity:.3;cursor:default;}

/* Not in collection */
.pvp-card.not-owned{opacity:.45;filter:grayscale(.6);}
.pvp-card.not-owned .pvp-btns{pointer-events:none;}
.not-owned-tag{position:absolute;bottom:38px;left:0;right:0;text-align:center;font-size:.55rem;color:var(--muted);letter-spacing:1px;z-index:3;}

/* Skin indicator */
.pvp-skin-dot{position:absolute;bottom:3px;right:3px;width:8px;height:8px;background:#a78bfa;border-radius:50%;z-index:3;border:1px solid rgba(255,255,255,.3);}

/* toast */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#0a1628;border:1px solid var(--pink);border-radius:8px;padding:.65rem 1.4rem;font-size:.82rem;color:var(--rose);z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}

/* battle link */
.battle-link{display:block;margin-top:.6rem;background:none;border:1px solid var(--pink);color:var(--pink);border-radius:6px;padding:.5rem;text-align:center;font-family:var(--font-h);font-size:1rem;letter-spacing:2px;text-decoration:none;transition:all .2s;}
.battle-link:hover{background:var(--pink-dim);}
  </style>
</head>
<body>
<script type="module" src="user_data.js"></script>
<header>
  <a class="logo" href="index.html">Re<span>:</span>Anime</a>
  <div class="hdr-right">
    <a href="battle.html" class="battle-link" style="padding:.3rem .9rem;margin:0;font-size:.8rem;">⚔ Batalla</a>
    <button class="back-btn" onclick="history.length>1?history.back():location.href='index.html'">← Volver</button>
  </div>
</header>

<div class="page">
  <!-- TEAMS -->
  <div class="teams-row">
    <div class="team-panel">
      <div class="team-panel-hd">
        <div class="team-panel-title">⚔ <em style="color:var(--pink)">Ataque</em></div>
        <button class="save-btn" onclick="saveTeam('atk')">Guardar</button>
      </div>
      <div class="team-slots" id="atk-slots"></div>
      <a href="battle.html" class="battle-link">Ir a Batalla →</a>
    </div>
    <div class="team-panel">
      <div class="team-panel-hd">
        <div class="team-panel-title">🛡 <em style="color:#60a5fa">Defensa</em></div>
        <button class="save-btn def" onclick="saveTeam('def')">Guardar</button>
      </div>
      <div class="team-slots" id="def-slots"></div>
    </div>
  </div>

  <!-- PVP CHARS -->
  <div class="pvp-section-title">Personajes <em>PVP</em></div>
  <div class="pvp-section-sub" id="pvp-sub">Cargando...</div>
  <div class="pvp-filter-row">
    <input class="pvp-search" id="pvp-search" placeholder="Buscar..." oninput="renderGrid()"/>
    <button class="fchip active" onclick="setF(this,'all')">Todos</button>
    <button class="fchip" onclick="setF(this,'owned')">Solo mi colección</button>
    <button class="fchip" onclick="setF(this,'atk')">En ataque</button>
    <button class="fchip" onclick="setF(this,'def')">En defensa</button>
    <button class="fchip" onclick="setF(this,'5')">★★★★★</button>
    <button class="fchip" onclick="setF(this,'4')">★★★★</button>
  </div>
  <div class="pvp-grid" id="pvp-grid"></div>
</div>

<div id="toast"></div>

<script>
const RC={5:'#fbbf24',4:'#c084fc',3:'#38bdf8',2:'#86efac',1:'#94a3b8'};
const RG={5:'linear-gradient(160deg,#1a0a00,#3d1900 50%)',4:'linear-gradient(160deg,#0d001a,#1e003d 50%)',3:'linear-gradient(160deg,#001220,#002444 50%)',2:'linear-gradient(160deg,#001a0a,#003018 60%)',1:'linear-gradient(160deg,#0d0d0d,#181818)'};
const AFF={fuego:'🔥',agua:'💧',tierra:'🌿',rayo:'⚡',luz:'✦',oscuridad:'🌑'};

let pvpData=null, myCol=[], colDedupe=new Map();
let atkTeam=[null,null,null,null], defTeam=[null,null,null,null];
let filt='all', upgrades={};  // name→{selectedSkin, selectedPassive, ...}

async function init(){
  try{const r=await fetch('pvp_chars.json');pvpData=await r.json();}catch{pvpData={characters:[]};}
  if(window.ReAnimeDB)myCol=await window.ReAnimeDB.getCollection();
  else{await new Promise(r=>window.addEventListener('reanimdb:ready',r,{once:true}));myCol=await window.ReAnimeDB.getCollection();}
  // Build dedupe map
  for(const c of myCol){const k=c.name.toLowerCase().trim();if(!colDedupe.has(k))colDedupe.set(k,{...c,count:1});else colDedupe.get(k).count++;}
  // Load saved teams
  const ud=await window.ReAnimeDB.loadUserData();
  if(ud.atkTeam?.length)atkTeam=ud.atkTeam.concat([null,null,null,null]).slice(0,4);
  if(ud.defTeam?.length)defTeam=ud.defTeam.concat([null,null,null,null]).slice(0,4);
  // Load upgrades for all owned pvp chars
  const pvpNames=(pvpData.characters||[]).map(c=>c.name);
  await Promise.all(pvpNames.filter(n=>colDedupe.has(n.toLowerCase().trim())).map(async n=>{
    try{upgrades[n]=await window.ReAnimeDB.getCharUpgrade(n);}catch{}
  }));
  renderSlots();renderGrid();
  document.getElementById('pvp-sub').textContent=`${pvpData.characters?.length||0} personajes disponibles · ${colDedupe.size} en tu colección`;
}

/* ── Get active image for a pvp char ── */
function getCharImage(pvpChar, collChar){
  const up = upgrades[pvpChar.name];
  // selectedSkin null/undefined = use default (collection image)
  if(up?.selectedSkin != null && pvpChar.skins?.[up.selectedSkin]){
    return pvpChar.skins[up.selectedSkin];
  }
  // Default: use collection image
  return collChar?.image || pvpChar.skins?.[0] || '';
}

/* ── SLOTS ── */
function renderSlots(){
  buildSlots('atk',atkTeam);
  buildSlots('def',defTeam);
}

function buildSlots(type,team){
  const c=document.getElementById(type+'-slots');c.innerHTML='';
  team.forEach((ch,i)=>{
    const el=document.createElement('div');
    el.className='team-slot'+(ch?' filled':'');
    if(ch){
      el.innerHTML=`<div class="slot-fill">
        <div class="slot-bg" style="background:${RG[ch.stars]||RG[1]}"></div>
        ${ch.image?`<img class="slot-img" src="${ch.image}" onerror="this.style.display='none'">`:''}
        <div class="slot-overlay"></div>
        <div class="slot-aff">${AFF[ch.affinity]||''}</div>
        <div class="slot-info">
          <div class="slot-name" style="color:${RC[ch.stars]||'#fff'}">${ch.name}</div>
          <div class="slot-role">${ch.role||''}</div>
        </div>
        <button class="slot-rm" onclick="removeSlot('${type}',${i},event)">✕</button>
      </div>`;
    } else {
      el.innerHTML=`<span style="font-size:1.3rem;opacity:.2">+</span><span class="slot-empty-lbl">SLOT ${i+1}</span>`;
    }
    c.appendChild(el);
  });
}

function removeSlot(type,i,e){
  e.stopPropagation();
  (type==='atk'?atkTeam:defTeam)[i]=null;
  renderSlots();renderGrid();
}

/* ── GRID ── */
function setF(el,v){
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');filt=v;renderGrid();
}

function renderGrid(){
  const grid=document.getElementById('pvp-grid');
  const q=(document.getElementById('pvp-search')?.value||'').toLowerCase();
  const chars=pvpData?.characters||[];
  const list=chars.filter(p=>{
    if(q&&!p.name.toLowerCase().includes(q)&&!p.series.toLowerCase().includes(q))return false;
    const owned=colDedupe.has(p.name.toLowerCase().trim());
    if(filt==='owned'&&!owned)return false;
    if(filt==='atk'&&!atkTeam.some(t=>t?.name===p.name))return false;
    if(filt==='def'&&!defTeam.some(t=>t?.name===p.name))return false;
    if(filt==='5'&&p.rarity!==5)return false;
    if(filt==='4'&&p.rarity!==4)return false;
    return true;
  });

  grid.innerHTML='';
  for(const p of list){
    const owned=colDedupe.has(p.name.toLowerCase().trim());
    const collChar=colDedupe.get(p.name.toLowerCase().trim());
    const inA=atkTeam.some(t=>t?.name===p.name);
    const inD=defTeam.some(t=>t?.name===p.name);
    const up=upgrades[p.name];
    const hasSkin=up?.selectedSkin!=null && p.skins?.[up.selectedSkin];
    const img=getCharImage(p, collChar);
    const col=RC[p.rarity]||'#94a3b8';
    const aff=AFF[p.affinity]||'';

    const el=document.createElement('div');
    let borderCls=`r${p.rarity}`;
    if(inA&&inD)borderCls+=' in-both';
    else if(inA)borderCls+=' in-atk';
    else if(inD)borderCls+=' in-def';
    if(!owned)borderCls+=' not-owned';
    el.className=`pvp-card ${borderCls}`;

    // Team badges
    const badges=(inA?'<span class="team-badge badge-atk">⚔</span>':'')+(inD?'<span class="team-badge badge-def">🛡</span>':'');

    el.innerHTML=`
      <div class="pvp-face">
        <div class="pvp-face-bg" style="background:${RG[p.rarity]||RG[1]}"></div>
        ${img?`<img src="${img}" onerror="this.style.display='none'">`:''}
        <div class="pvp-face-overlay"></div>
        <div class="pvp-face-aff">${aff}</div>
        ${badges?`<div class="pvp-face-team">${badges}</div>`:''}
        ${hasSkin?'<div class="pvp-skin-dot" title="Skin equipada"></div>':''}
        ${!owned?'<div class="not-owned-tag">NO TIENES</div>':''}
      </div>
      <div class="pvp-info">
        <div class="pvp-name" style="color:${col}">${p.name}</div>
        <div class="pvp-meta">${p.series} · ${p.role||''}</div>
      </div>
      <div class="pvp-btns">
        <button class="qadd ${inA?'rm-atk':'atk'}" onclick="toggleTeam('atk','${p.name}')" ${!owned&&!inA?'disabled':''}>
          ${inA?'✕ ATK':'+ATK'}
        </button>
        <button class="qadd ${inD?'rm-def':'def'}" onclick="toggleTeam('def','${p.name}')" ${!owned&&!inD?'disabled':''}>
          ${inD?'✕ DEF':'+DEF'}
        </button>
      </div>
    `;
    grid.appendChild(el);
  }
}

function toggleTeam(type,name){
  const team=type==='atk'?atkTeam:defTeam;
  const idx=team.findIndex(t=>t?.name===name);
  if(idx>=0){
    team[idx]=null;
  } else {
    const slot=team.findIndex(t=>t===null);
    if(slot===-1){showToast('Equipo lleno (máx 4).');return;}
    const p=pvpData.characters.find(c=>c.name===name);
    if(!p)return;
    const collChar=colDedupe.get(name.toLowerCase().trim());
    const img=getCharImage(p,collChar);
    team[slot]={name:p.name,anime:p.series,image:img,stars:p.rarity,affinity:p.affinity,role:p.role||''};
  }
  renderSlots();renderGrid();
}

async function saveTeam(type){
  const team=type==='atk'?atkTeam:defTeam;
  const valid=team.filter(Boolean);
  if(!valid.length){showToast('El equipo está vacío.');return;}
  const field=type==='atk'?'atkTeam':'defTeam';
  const toStore=team.map(c=>c?{name:c.name,anime:c.anime,image:c.image||'',stars:c.stars,affinity:c.affinity||'',role:c.role||''}:null);
  const user=JSON.parse(localStorage.getItem('user'));
  if(user){
    try{
      const url=`https://firestore.googleapis.com/v1/projects/reanime-1a781/databases/(default)/documents/users/${user.id}?key=AIzaSyDjVVsA-22tvlsUbbDenoS_vWlWLNY-HsU&updateMask.fieldPaths=${field}`;
      await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:{[field]:{arrayValue:{values:toStore.map(c=>c?{mapValue:{fields:{name:{stringValue:c.name},anime:{stringValue:c.anime},image:{stringValue:c.image||''},stars:{integerValue:c.stars},affinity:{stringValue:c.affinity||''},role:{stringValue:c.role||''}}}}:{nullValue:null})}}}})});
    }catch(e){console.warn('saveTeam:',e);}
  }
  showToast(`✓ Equipo de ${type==='atk'?'ataque':'defensa'} guardado`);
}

function showToast(msg,ms=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),ms);}

if(window.ReAnimeDB)init();
else window.addEventListener('reanimdb:ready',init,{once:true});
</script>
</body>
</html>
